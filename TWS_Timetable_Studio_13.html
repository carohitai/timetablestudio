<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The World School — Timetable Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{--bg:#f6f3ec;--paper:#fbf9f3;--ink:#1a1f1c;--ink-soft:#4a544d;--ink-muted:#8a8f88;--line:#e3ddcf;--line-soft:#ebe6da;--accent:#0d4f3c;--accent-soft:#1a6b54;--warm:#b8651f;--warm-soft:#d97a26;--danger:#9a2a2a;--danger-soft:#fde2e2}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Geist',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-height:100vh}
  .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}
  .mono{font-family:'Geist Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:inherit;color:var(--ink)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-muted)}

  .app{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--paper);border-right:1px solid var(--line);padding:28px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{padding:0 28px 24px;border-bottom:1px solid var(--line)}
  .brand .mark{font-size:11px;letter-spacing:0.18em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px}
  .brand .name{font-size:24px;line-height:1.1;color:var(--ink)}
  .brand .name em{font-style:italic;color:var(--accent)}
  .nav{padding:20px 14px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:6px;color:var(--ink-soft);font-size:13.5px;font-weight:500;width:100%;text-align:left;transition:all .15s;margin-bottom:2px}
  .nav-item:hover{background:var(--line-soft);color:var(--ink)}
  .nav-item.active{background:var(--ink);color:var(--paper)}
  .nav-item .num{font-size:11px;color:var(--ink-muted);font-family:'Geist Mono',monospace;width:18px}
  .nav-item.active .num{color:var(--paper);opacity:.6}
  .footer-note{padding:16px 28px;font-size:11px;color:var(--ink-muted);border-top:1px solid var(--line);line-height:1.6}

  .main{flex:1;padding:36px 48px 80px;max-width:calc(100vw - 240px);overflow-x:hidden}
  .pagehead{margin-bottom:32px;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .pagehead h1{font-size:42px;line-height:1.05;color:var(--ink);margin-bottom:6px}
  .pagehead .sub{color:var(--ink-soft);font-size:14px;max-width:560px}
  .pagehead .actions{display:flex;gap:8px}

  .btn{padding:9px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-primary:hover{background:var(--accent)}
  .btn-ghost{border-color:var(--line);color:var(--ink-soft);background:var(--paper)}
  .btn-ghost:hover{border-color:var(--ink-muted);color:var(--ink)}
  .btn-success{background:#065f46;color:var(--paper)}
  .btn-success:hover{background:#047857}
  .btn-danger{color:var(--danger);background:transparent}
  .btn-danger:hover{background:var(--danger-soft)}
  .btn-sm{padding:6px 11px;font-size:12px}
  .btn-icon{width:28px;height:28px;padding:0;justify-content:center;border-radius:5px;color:var(--ink-muted)}
  .btn-icon:hover{background:var(--line-soft);color:var(--ink)}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:24px;margin-bottom:20px}
  .card-title{font-size:11px;letter-spacing:0.16em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:14px;font-weight:500}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:6px;background:var(--paper);transition:border .15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:12px;align-items:flex-end}
  .row .field{flex:1;margin-bottom:0}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--paper)}
  td{padding:12px 14px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(13,79,60,0.025)}

  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:14px;font-size:11.5px;font-weight:500;background:var(--line-soft);color:var(--ink-soft)}
  .chip-color{width:9px;height:9px;border-radius:50%}
  .badge{display:inline-block;padding:2px 8px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border-radius:4px;background:var(--line-soft);color:var(--ink-soft)}
  .badge-warn{background:#fef3c7;color:#92400e}
  .badge-ok{background:#d1fae5;color:#065f46}
  .badge-err{background:var(--danger-soft);color:var(--danger)}

  .tt-toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .tt-toolbar select{padding:8px 12px;border:1px solid var(--line);border-radius:6px;background:var(--paper);font-weight:500;min-width:180px}
  .tt-grid{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper)}
  .tt-row{display:grid;grid-template-columns:90px repeat(var(--cols),1fr);border-bottom:1px solid var(--line-soft)}
  .tt-row:last-child{border-bottom:none}
  .tt-cell{padding:10px;border-right:1px solid var(--line-soft);min-height:64px;display:flex;flex-direction:column;justify-content:center;font-size:12.5px;position:relative;cursor:pointer;transition:background .12s}
  .tt-cell:last-child{border-right:none}
  .tt-cell:hover{background:rgba(13,79,60,0.04)}
  .tt-cell.header{background:var(--bg);font-weight:500;color:var(--ink-soft);font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:default;text-align:center;padding:14px 8px}
  .tt-cell.time{background:var(--bg);color:var(--ink-muted);font-family:'Geist Mono',monospace;font-size:10.5px;cursor:default;text-align:center;padding:8px 4px;line-height:1.3}
  .tt-cell.break{background:repeating-linear-gradient(45deg,var(--line-soft),var(--line-soft) 6px,transparent 6px,transparent 12px);color:var(--ink-muted);font-style:italic;cursor:default;text-align:center;justify-content:center;align-items:center}
  .tt-cell.assembly{background:rgba(13,79,60,0.08);color:var(--accent);font-weight:500;cursor:default;text-align:center;justify-content:center;align-items:center;font-size:11.5px}
  .tt-cell.orientation{background:rgba(184,101,31,0.08);color:var(--warm);font-weight:500;cursor:default;text-align:center;justify-content:center;align-items:center;font-size:11.5px}
  .tt-cell .subj{font-weight:600;font-size:12.5px;line-height:1.2;margin-bottom:2px;display:flex;align-items:center;gap:6px}
  .tt-cell .teach{font-size:11px;color:var(--ink-muted)}
  .tt-cell.empty{color:var(--ink-muted);font-style:italic;font-size:11.5px;text-align:center;justify-content:center;align-items:center}
  .tt-cell.conflict{background:var(--danger-soft) !important}
  .tt-cell.conflict::before{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--danger);border-radius:50%}
  .tt-cell.room-conflict{background:#fef3c7 !important}
  .tt-cell.room-conflict::before{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;background:#92400e;border-radius:50%}

  .modal-bg{position:fixed;inset:0;background:rgba(26,31,28,0.4);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--paper);border-radius:12px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .modal-head{padding:22px 24px;border-bottom:1px solid var(--line)}
  .modal-head h3{font-size:22px;line-height:1.2}
  .modal-body{padding:20px 24px;overflow-y:auto}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}

  .stat{padding:18px 20px;background:var(--paper);border:1px solid var(--line);border-radius:10px}
  .stat .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:8px}
  .stat .val{font-size:32px;font-family:'Instrument Serif',serif;line-height:1;color:var(--ink)}
  .stat .delta{font-size:12px;color:var(--ink-soft);margin-top:6px}

  .load-bar{height:6px;background:var(--line-soft);border-radius:3px;overflow:hidden;margin-top:6px}
  .load-fill{height:100%;background:var(--accent);transition:width .3s}
  .load-fill.warn{background:var(--warm)}
  .load-fill.full{background:var(--accent-soft)}
  .load-fill.over{background:var(--danger)}

  .heat{display:grid;grid-template-columns:80px repeat(var(--periods),1fr);gap:2px;font-size:10px}
  .heat-cell{padding:6px 4px;text-align:center;border-radius:3px;background:var(--line-soft);min-height:24px;display:flex;align-items:center;justify-content:center}
  .heat-cell.lvl1{background:#dde7e1}.heat-cell.lvl2{background:#a4c8b9}.heat-cell.lvl3{background:#5ea08a}.heat-cell.lvl4{background:var(--accent);color:var(--paper)}
  .heat-cell.label{background:transparent;justify-content:flex-start;color:var(--ink-soft);font-weight:500}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-muted)}
  .empty-state h3{font-size:24px;color:var(--ink-soft);margin-bottom:8px}
  .empty-state p{margin-bottom:16px}

  .tab-bar{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:fit-content}
  .tab-btn{padding:10px 24px;font-size:13px;font-weight:500;background:var(--paper);color:var(--ink-soft);border:none;cursor:pointer;border-right:1px solid var(--line);transition:all .15s}
  .tab-btn:last-child{border-right:none}
  .tab-btn:hover{background:var(--bg)}
  .tab-btn.active{background:var(--ink);color:var(--paper)}

  /* Searchable Select */
  .ss-wrap{position:relative}
  .ss-trigger{width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:6px;background:var(--paper);cursor:pointer;font-size:13px;text-align:left;display:flex;justify-content:space-between;align-items:center;min-height:38px}
  .ss-trigger:hover{border-color:var(--ink-muted)}
  .ss-trigger .ss-arrow{font-size:10px;color:var(--ink-muted)}
  .ss-drop{position:absolute;top:100%;left:0;right:0;background:var(--paper);border:1px solid var(--line);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:40;margin-top:4px;overflow:hidden}
  .ss-search{width:100%;padding:10px 12px;border:none;border-bottom:1px solid var(--line);font-size:13px;outline:none}
  .ss-list{max-height:180px;overflow-y:auto}
  .ss-opt{padding:8px 12px;cursor:pointer;font-size:13px;transition:background .1s}
  .ss-opt:hover{background:var(--line-soft)}
  .ss-opt.selected{background:var(--accent);color:var(--paper)}

  /* Avatar */
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--line-soft);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--ink-muted);overflow:hidden;flex-shrink:0}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar-lg{width:72px;height:72px;font-size:22px;cursor:pointer;border:2px dashed var(--line);transition:border-color .15s}
  .avatar-lg:hover{border-color:var(--accent)}

  /* Proxy */
  .proxy-cell{padding:8px 10px;border:1px solid var(--line-soft);border-radius:6px;background:var(--paper);min-height:48px}
  .proxy-cell.assigned{border-color:var(--accent);background:rgba(13,79,60,0.04)}
  .proxy-slip{background:white;padding:32px;border:1px solid var(--line);border-radius:10px;margin-top:16px}

  @media (max-width:900px){
    .sidebar{width:64px}
    .brand,.footer-note,.nav-item span:not(.num){display:none}
    .nav{padding:20px 8px}
    .nav-item{justify-content:center}
    .main{padding:24px;max-width:calc(100vw - 64px)}
    .pagehead h1{font-size:30px}
    .grid-3,.grid-4{grid-template-columns:1fr 1fr}
  }
  @media print{
    body{background:white}
    .sidebar,.pagehead .actions,.tt-toolbar,.no-print{display:none !important}
    .main{padding:0;max-width:100%}
    .card{border:1px solid #ccc;page-break-inside:avoid}
  }
</style>
</head>

function migrateTeachers(teachers, qualMaster){
  if(!teachers) return teachers;
  const profList=['B.Ed.','M.Ed.','D.El.Ed.','D.Ed.','B.P.Ed.','M.P.Ed.','B.Lib.Sc.','M.Lib.Sc.','N.T.T.','E.C.C.Ed.','CTET','MH-TET'];
  const qm = qualMaster || DEFAULT_QUAL_MASTER;
  return teachers.map(t=>{
    const b={qualifications:[],otherCourses:'',designation:'Asst. Teacher',status:'OLD',photo:'',assignedClasses:[],...t};
    // Migrate old single 'degree' field
    if(t.degree!==undefined&&!t.degreeQual&&!t.profCourse&&!t.qualifications){
      if(t.degree){
        const match=qm.find(q=>q.name===t.degree);
        if(match) b.qualifications=[match.id];
      }
    }
    delete b.degree;
    // Migrate old degreeQual/profCourse arrays to unified qualifications
    if((t.degreeQual&&t.degreeQual.length)||(t.profCourse&&t.profCourse.length)){
      if(!t.qualifications||!t.qualifications.length){
        const names=[...(t.degreeQual||[]),...(t.profCourse||[])];
        b.qualifications=names.map(n=>{const m=qm.find(q=>q.name===n);return m?m.id:null;}).filter(Boolean);
      }
    }
    delete b.degreeQual; delete b.profCourse;
    if(typeof b.qualifications==='undefined') b.qualifications=[];
    if(!b.assignedClasses) b.assignedClasses=[];
    return b;
  });
}

function migrateData(old){
  if(old.classes) old.classes=old.classes.map(c=>c.group?c:{...c,group:c.name.match(/^[1-4]/)?'primary':'upper'});
  if(old.school&&old.school.periods&&!old.school.primaryPeriods){old.school.primaryPeriods=old.school.periods;old.school.upperPeriods=old.school.periods;}
  if(old.school&&!old.school.activeSession) old.school.activeSession='normal';
  if(!old.qualMaster) old.qualMaster=DEFAULT_QUAL_MASTER.map(q=>({...q}));
  if(!old.rooms) old.rooms=[{id:'r1',name:'Classroom 1'},{id:'r2',name:'Classroom 2'},{id:'r3',name:'Computer Lab'},{id:'r4',name:'Library'},{id:'r5',name:'Playground'}];
  if(old.teachers) old.teachers=migrateTeachers(old.teachers, old.qualMaster);
  if(!old.proxyAssignments) old.proxyAssignments={};
  return old;
}

function downloadBlob(blob, filename){
  const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=filename;a.click();URL.revokeObjectURL(u);
}

function doExport(format, title, headers, rows, subtitle){
  const fn = prompt('File name:', title.replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10));
  if(!fn) return;
  const html = buildExportHTML(title, headers, rows, subtitle);

  if(format==='print'||format==='pdf'){
    const w=window.open('','_blank');w.document.write(html);w.document.close();
    setTimeout(()=>w.print(),400);
    return;
  }
  if(format==='excel'){
    // Excel XML (SpreadsheetML) – opens natively in Excel/Sheets
    let xml='<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="'+title+'"><Table>';
    xml+='<Row>'+headers.map(c=>'<Cell><Data ss:Type="String">'+c+'</Data></Cell>').join('')+'</Row>';
    rows.forEach(r=>{xml+='<Row>'+r.map(c=>'<Cell><Data ss:Type="String">'+(c!=null?String(c).replace(/&/g,'&amp;').replace(/</g,'&lt;'):'')+'</Data></Cell>').join('')+'</Row>';});
    xml+='</Table></Worksheet></Workbook>';
    downloadBlob(new Blob([xml],{type:'application/vnd.ms-excel'}), fn.endsWith('.xls')?fn:fn+'.xls');
    return;
  }
  if(format==='word'){
    const docHtml='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>'+html.match(/<body>([\s\S]*)<\/body>/)[1]+'</body></html>';
    downloadBlob(new Blob([docHtml],{type:'application/msword'}), fn.endsWith('.doc')?fn:fn+'.doc');
    return;
  }
}

// ====== Helpers ======
const allocKey=(c,s)=>`${c}|${s}`;
function isNonTeaching(p){return p.isBreak||p.isAssembly||p.isOrientation}
function getTeachingCount(p){return p.filter(x=>!isNonTeaching(x)).length}
function getPeriodsForClass(school,cls){return(cls&&cls.group==='upper')?(school.upperPeriods||school.primaryPeriods):school.primaryPeriods}
function timeOverlaps(s1,e1,s2,e2){return s1<e2&&e1>s2}

function findConflicts(tt,classes,school){
  const conflicts={};const teacherMap={};const roomMap={};
  classes.forEach(cls=>{const days=tt[cls.id]||{};const pList=getPeriodsForClass(school,cls);
    Object.keys(days).forEach(d=>{Object.keys(days[d]||{}).forEach(pi=>{const c=days[d][pi];if(!c)return;const p=pList[Number(pi)];if(!p||isNonTeaching(p))return;
      // Teacher conflict check
      if(c.teacherId){const k=`${d}|${p.start}|${p.end}|T|${c.teacherId}`;if(!teacherMap[k])teacherMap[k]=[];teacherMap[k].push(`${cls.id}|${d}|${pi}`);}
      // Room conflict check
      if(c.roomId){const rk=`${d}|${p.start}|${p.end}|R|${c.roomId}`;if(!roomMap[rk])roomMap[rk]=[];roomMap[rk].push(`${cls.id}|${d}|${pi}`);}
    });});});
  Object.values(teacherMap).forEach(arr=>{if(arr.length>1)arr.forEach(k=>{conflicts[k]='teacher';});});
  Object.values(roomMap).forEach(arr=>{if(arr.length>1)arr.forEach(k=>{conflicts[k]=conflicts[k]?'both':'room';});});
  return conflicts;
}

function teacherLoad(teacher,tt,classes,school){
  let total=0;const bySubject={},byClass={},byDay={};
  school.days.forEach((_,i)=>{byDay[i]=0;});
  classes.forEach(cls=>{const tbl=tt[cls.id]||{};const pList=getPeriodsForClass(school,cls);
    Object.keys(tbl).forEach(d=>{Object.keys(tbl[d]||{}).forEach(pi=>{const c=tbl[d][pi];
      if(c&&c.teacherId===teacher.id){const p=pList[Number(pi)];if(p&&!isNonTeaching(p)){total++;bySubject[c.subjectId]=(bySubject[c.subjectId]||0)+1;byClass[cls.id]=(byClass[cls.id]||0)+1;byDay[d]=(byDay[d]||0)+1;}}});});});
  return{total,bySubject,byClass,byDay};
}

function getTeacherScheduleForDay(teacherId,dayIdx,tt,classes,school){
  const sched=[];
  classes.forEach(cls=>{const pList=getPeriodsForClass(school,cls);const dayTT=(tt[cls.id]||{})[dayIdx]||{};
    Object.entries(dayTT).forEach(([pi,cell])=>{if(cell&&cell.teacherId===teacherId){const p=pList[Number(pi)];if(p&&!isNonTeaching(p))sched.push({periodIdx:Number(pi),name:p.name,start:p.start,end:p.end,classId:cls.id,className:cls.name,subjectId:cell.subjectId,group:cls.group});}});});
  return sched.sort((a,b)=>a.start.localeCompare(b.start));
}

function findFreeTeachers(dayIdx,start,end,tt,classes,school,teachers,excludeIds){
  const busy=new Set(excludeIds||[]);
  classes.forEach(cls=>{const pList=getPeriodsForClass(school,cls);const dayTT=(tt[cls.id]||{})[dayIdx]||{};
    Object.entries(dayTT).forEach(([pi,cell])=>{if(!cell||!cell.teacherId)return;const p=pList[Number(pi)];if(!p||isNonTeaching(p))return;
      if(timeOverlaps(p.start,p.end,start,end))busy.add(cell.teacherId);});});
  return teachers.filter(t=>!busy.has(t.id));
}

function SearchSelect({value,options,onChange,placeholder,style:wrapStyle}){
  const[open,setOpen]=useState(false);const[search,setSearch]=useState('');const ref=useRef(null);
  const filtered=options.filter(o=>o.label.toLowerCase().includes(search.toLowerCase()));
  const selected=options.find(o=>o.value===value);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[open]);
  return(
    <div className="ss-wrap" ref={ref} style={wrapStyle}>
      <button type="button" className="ss-trigger" onClick={()=>{setOpen(!open);setSearch('');}}>
        <span style={{color:selected?'var(--ink)':'var(--ink-muted)'}}>{selected?selected.label:(placeholder||'Select...')}</span>
        <span className="ss-arrow">{open?'▲':'▼'}</span>
      </button>
      {open&&(<div className="ss-drop">
        <input className="ss-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type to search..." autoFocus/>
        <div className="ss-list">{filtered.length===0?<div className="ss-opt" style={{color:'var(--ink-muted)',fontStyle:'italic'}}>No match</div>:
          filtered.map(o=>(<div key={o.value} className={`ss-opt ${o.value===value?'selected':''}`} onClick={()=>{onChange(o.value);setOpen(false);setSearch('');}}>{o.label}</div>))
        }</div>
      </div>)}
    </div>
  );
}

  const pri=getTeachingCount(data.school.primaryPeriods)*data.school.days.length;
  const up=getTeachingCount(data.school.upperPeriods||data.school.primaryPeriods)*data.school.days.length;
  let filled=0,total=0;
  data.classes.forEach(c=>{total+=(c.group==='upper'?up:pri);const tt=data.timetable[c.id]||{};Object.values(tt).forEach(d=>Object.values(d||{}).forEach(p=>{if(p&&p.subjectId)filled++;}));});
  const pct=total?Math.round(filled/total*100):0;
  const conflicts=findConflicts(data.timetable,data.classes,data.school);const cc=Object.keys(conflicts).length;
  return(<div>

// ===== SchoolSetup =====
function SchoolSetup({data,update}){
  const[session,setSession]=useState(data.school.activeSession||'normal');const[group,setGroup]=useState('primary');
  const periods=(group==='upper')?(data.school.upperPeriods||data.school.primaryPeriods):data.school.primaryPeriods;
  const[edited,setEdited]=useState(periods.map(p=>({...p})));const[days,setDays]=useState(data.school.days);
  useEffect(()=>{const p=(group==='upper')?(data.school.upperPeriods||data.school.primaryPeriods):data.school.primaryPeriods;setEdited(p.map(x=>({...x})));},[group,data.school.primaryPeriods,data.school.upperPeriods]);
  const loadSession=k=>{setSession(k);update({school:{...data.school,activeSession:k,primaryPeriods:SESSION_PRESETS[k].primary.periods.map(p=>({...p})),upperPeriods:SESSION_PRESETS[k].upper.periods.map(p=>({...p}))}});};
  const save=()=>{const patch=group==='upper'?{upperPeriods:edited}:{primaryPeriods:edited};update({school:{...data.school,...patch,days,activeSession:session}});};
  const updP=(i,k,v)=>setEdited(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});
  const addP=()=>setEdited(p=>[...p,{name:'New',start:'14:15',end:'14:55'}]);
  const remP=i=>setEdited(p=>p.filter((_,idx)=>idx!==i));
  const cycleType=i=>setEdited(p=>{const n=[...p];const c=n[i];if(!c.isBreak&&!c.isAssembly&&!c.isOrientation)n[i]={...c,isBreak:true,isAssembly:false,isOrientation:false};else if(c.isBreak)n[i]={...c,isBreak:false,isAssembly:true,isOrientation:false};else if(c.isAssembly)n[i]={...c,isBreak:false,isAssembly:false,isOrientation:true};else n[i]={...c,isBreak:false,isAssembly:false,isOrientation:false};return n;});
  const tLabel=p=>p.isBreak?'Recess':p.isAssembly?'Assembly':p.isOrientation?'Orientation':'Teaching';
  const tStyle=p=>p.isBreak?{background:'var(--danger-soft)',color:'var(--danger)'}:p.isAssembly?{background:'rgba(13,79,60,0.1)',color:'var(--accent)'}:p.isOrientation?{background:'rgba(184,101,31,0.1)',color:'var(--warm)'}:{};
  const dsExpH=['#','Label','Start','End','Type'];
  const dsExpR=edited.map((p,i)=>[String(i+1).padStart(2,'0'),p.name,p.start,p.end,p.isBreak?'Recess':p.isAssembly?'Assembly':p.isOrientation?'Orientation':'Teaching']);
  return(<div>
    <div className="pagehead"><div><h1 className="serif">Day <em>Structure</em></h1><div className="sub">Pick session, then edit Primary or Upper grids independently.</div></div><div className="actions">
      <ExportBar title={'Day Structure – '+(group==='primary'?'Primary':'Upper')} headers={dsExpH} rows={dsExpR} subtitle={SESSION_PRESETS[session].label+' Session'}/>
      <button className="btn btn-primary" onClick={save}>Save Changes</button></div></div>
    <div className="card"><div className="card-title">Session Presets</div><div className="grid-3">{Object.entries(SESSION_PRESETS).map(([k,pr])=>(<button key={k} onClick={()=>loadSession(k)} style={{textAlign:'left',padding:'16px 18px',border:session===k?'2px solid var(--accent)':'1px solid var(--line)',borderRadius:8,background:session===k?'var(--accent)':'var(--paper)',color:session===k?'var(--paper)':'var(--ink)',cursor:'pointer'}}><div style={{fontWeight:600,fontSize:14}}>{pr.label}</div><div style={{fontSize:12,opacity:.7}}>{pr.months}</div></button>))}</div></div>
    <div className="card"><div className="card-title">Working Days</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>(<button key={d} onClick={()=>setDays(ds=>ds.includes(d)?ds.filter(x=>x!==d):[...ds,d])} className={days.includes(d)?'btn btn-primary btn-sm':'btn btn-ghost btn-sm'}>{d}</button>))}</div></div>
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}><div className="card-title" style={{margin:0}}>Period Grid</div>
          <div className="tab-bar"><button className={`tab-btn ${group==='primary'?'active':''}`} onClick={()=>setGroup('primary')}>Primary (1–4)</button><button className={`tab-btn ${group==='upper'?'active':''}`} onClick={()=>setGroup('upper')}>Upper (5–10)</button></div>
        </div><button className="btn btn-ghost btn-sm" onClick={addP}>+ Add</button></div>
      <div style={{fontSize:12,color:'var(--ink-muted)',marginBottom:10}}>{getTeachingCount(edited)} teaching | Click type to cycle</div>
      <table><thead><tr><th>#</th><th>Label</th><th>Start</th><th>End</th><th>Type</th><th></th></tr></thead><tbody>
        {edited.map((p,i)=>(<tr key={i}><td className="mono" style={{color:'var(--ink-muted)'}}>{String(i+1).padStart(2,'0')}</td><td><input value={p.name} onChange={e=>updP(i,'name',e.target.value)} style={{width:140,padding:'6px 10px',border:'1px solid var(--line)',borderRadius:5}}/></td><td><input type="time" value={p.start} onChange={e=>updP(i,'start',e.target.value)} style={{padding:'6px 10px',border:'1px solid var(--line)',borderRadius:5}}/></td><td><input type="time" value={p.end} onChange={e=>updP(i,'end',e.target.value)} style={{padding:'6px 10px',border:'1px solid var(--line)',borderRadius:5}}/></td><td><button className="btn btn-ghost btn-sm" style={tStyle(p)} onClick={()=>cycleType(i)}>{tLabel(p)}</button></td><td style={{textAlign:'right'}}><button className="btn btn-icon btn-danger" onClick={()=>remP(i)}>x</button></td></tr>))}
      </tbody></table>
    </div>
  </div>);
}

// ===== Classes =====

  const startEdit=c=>{setEditId(c.id);setDraft({...c});};
  const cancelEdit=()=>{setEditId(null);setDraft(null);};
  const saveEdit=()=>{if(!draft)return;update({classes:data.classes.map(c=>c.id===draft.id?draft:c)});setEditId(null);setDraft(null);};
  const deleteClass=id=>{if(!confirm('Delete this class and its timetable?'))return;setEditId(null);setDraft(null);update({classes:data.classes.filter(c=>c.id!==id),timetable:Object.fromEntries(Object.entries(data.timetable).filter(([k])=>k!==id))});};

              <div style={{display:'grid',gridTemplateColumns:'1fr 120px 100px 1fr',gap:12,alignItems:'end',marginBottom:12}}>

              </div>

function QualMasterPage({data,update}){
  const[name,setName]=useState('');const[cat,setCat]=useState('degree');const[subjMap,setSubjMap]=useState([]);

  const addQual=()=>{if(!name.trim())return;update({qualMaster:[...qm,{id:uid(),name:name.trim(),cat,subjectMap:[...subjMap]}]});setName('');setCat('degree');setSubjMap([]);};
  const removeQual=id=>{setEditId(null);update({qualMaster:qm.filter(q=>q.id!==id)});};
  const updQual=(qId,patch)=>update({qualMaster:qm.map(q=>q.id===qId?{...q,...patch}:q)});
  const toggleSubjMap=(qId,sId)=>{const q=qm.find(x=>x.id===qId);if(!q)return;const sm=q.subjectMap||[];updQual(qId,{subjectMap:sm.includes(sId)?sm.filter(x=>x!==sId):[...sm,sId]});};
  const toggleNewSubj=sId=>setSubjMap(s=>s.includes(sId)?s.filter(x=>x!==sId):[...s,sId]);
  const iStyle={padding:'6px 10px',border:'1px solid var(--line)',borderRadius:5,fontSize:12.5};
  const degrees=qm.filter(q=>q.cat==='degree');const professional=qm.filter(q=>q.cat==='professional');const other=qm.filter(q=>q.cat!=='degree'&&q.cat!=='professional');
  const expH=['Name','Category','Subject Mapping'];
  const expR=qm.map(q=>[q.name,q.cat,(q.subjectMap||[]).map(sId=>{const s=data.subjects.find(x=>x.id===sId);return s?s.code:'';}).join(', ')]);

  const renderGroup=(label,items)=>(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:600,color:'var(--ink-soft)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.08em'}}>{label} ({items.length})</div>
      {items.map(q=>(
        <React.Fragment key={q.id}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--line-soft)',cursor:'pointer'}} onClick={()=>setEditId(editId===q.id?null:q.id)}>

          <button className="btn btn-icon btn-danger" onClick={e=>{e.stopPropagation();removeQual(q.id);}}>x</button>

        {editId===q.id&&(
          <div style={{background:'var(--bg)',padding:'12px 16px',marginBottom:8,borderLeft:'3px solid var(--accent)',borderRadius:'0 6px 6px 0'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 120px',gap:10,marginBottom:10}}>
              <div className="field" style={{margin:0}}><label>Name</label><input value={q.name} onChange={e=>updQual(q.id,{name:e.target.value})} style={iStyle}/></div>
              <div className="field" style={{margin:0}}><label>Category</label><select value={q.cat} onChange={e=>updQual(q.id,{cat:e.target.value})} style={iStyle}><option value="degree">Degree</option><option value="professional">Professional</option><option value="other">Other</option></select></div>
            </div>

            </div>
          </div>

      ))}

  return(<div>
    <div className="pagehead"><div><h1 className="serif">Qualification <em>Master</em></h1><div className="sub">Manage all degree and professional qualifications. Subject mappings here auto-assign when a qualification is selected in Faculty.</div></div>
      <ExportBar title="Qualification Master" headers={expH} rows={expR}/>

    <div className="card"><div className="card-title">Add Qualification</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 120px auto',gap:12,alignItems:'end',marginBottom:12}}>
        <div className="field" style={{margin:0}}><label>Qualification Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. M.A.(History)" onKeyDown={e=>e.key==='Enter'&&addQual()} style={iStyle}/></div>
        <div className="field" style={{margin:0}}><label>Category</label><select value={cat} onChange={e=>setCat(e.target.value)} style={iStyle}><option value="degree">Degree</option><option value="professional">Professional</option><option value="other">Other</option></select></div>
        <button className="btn btn-primary" onClick={addQual}>Add</button>

    <div className="card">
      {renderGroup('Degree Qualifications',degrees)}

      {other.length>0&&renderGroup('Other',other)}

  </div>);
}

function TeachersPage({data,update}){

  const deleteTeacher=id=>{if(!confirm('Delete this teacher?'))return;setEditId(null);setDraft(null);update({teachers:data.teachers.filter(t=>t.id!==id)});};
  const updDraft=(k,v)=>setDraft(d=>({...d,[k]:v}));

}

// ===== Timetable =====
function TimetablePage({data,update}){
  const[classId,setClassId]=useState(data.classes[0]?data.classes[0].id:'');const[picker,setPicker]=useState(null);
  const conflicts=useMemo(()=>findConflicts(data.timetable,data.classes,data.school),[data.timetable,data.classes,data.school]);
  useEffect(()=>{if(!classId&&data.classes[0])setClassId(data.classes[0].id);},[data.classes,classId]);
  if(!data.classes.length)return<div><div className="pagehead"><div><h1 className="serif"><em>Timetable</em></h1></div></div><div className="card"><div className="empty-state"><h3>Add classes first</h3></div></div></div>;
  const cls=data.classes.find(c=>c.id===classId);const pList=cls?getPeriodsForClass(data.school,cls):data.school.primaryPeriods;const tCount=getTeachingCount(pList);
  const setCell=(sId,roomId)=>{if(!picker)return;const tId=sId?data.allocations[allocKey(classId,sId)]:null;const tt=JSON.parse(JSON.stringify(data.timetable));if(!tt[classId])tt[classId]={};if(!tt[classId][picker.d])tt[classId][picker.d]={};if(sId)tt[classId][picker.d][picker.p]={subjectId:sId,teacherId:tId||null,roomId:roomId||null};else delete tt[classId][picker.d][picker.p];update({timetable:tt});setPicker(null);};
  const clearClass=()=>{if(!confirm('Clear?'))return;const tt={...data.timetable};delete tt[classId];update({timetable:tt});};
  const autoFill=()=>{const al=Object.entries(data.allocations).filter(([k])=>k.startsWith(classId+'|'));if(!al.length){alert('No allocations.');return;}const ws=tCount*data.school.days.length;const cnt={};const ps=Math.floor(ws/al.length);al.forEach(([k])=>cnt[k.split('|')[1]]=ps);let rem=ws-ps*al.length;al.forEach(([k])=>{if(rem>0){cnt[k.split('|')[1]]++;rem--;}});const tt=JSON.parse(JSON.stringify(data.timetable));if(!tt[classId])tt[classId]={};const pos=[];data.school.days.forEach((_,d)=>pList.forEach((p,pi)=>{if(!isNonTeaching(p))pos.push([d,pi]);}));const pool=[];Object.entries(cnt).forEach(([s,n])=>{for(let i=0;i<n;i++)pool.push(s);});for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}pos.forEach(([d,pi],i)=>{const s=pool[i];if(!s)return;if(!tt[classId][d])tt[classId][d]={};tt[classId][d][pi]={subjectId:s,teacherId:data.allocations[allocKey(classId,s)]||null,roomId:null};});update({timetable:tt});};
  const clsOpts=data.classes.map(c=>({value:c.id,label:c.name+' ('+(c.group==='upper'?'Upper':'Primary')+')'}));
  const ttExpH=['Period',...data.school.days.map(d=>d.slice(0,3))];
  const ttExpR=pList.map((p,pi)=>[p.name+' ('+p.start+'–'+p.end+')',...data.school.days.map((_,di)=>{if(isNonTeaching(p))return p.name;const cell=data.timetable[classId]&&data.timetable[classId][di]&&data.timetable[classId][di][pi];if(!cell)return'';const subj=data.subjects.find(s=>s.id===cell.subjectId);const teacher=data.teachers.find(t=>t.id===cell.teacherId);const room=cell.roomId?(data.rooms||[]).find(r=>r.id===cell.roomId):null;return(subj?subj.code:'')+(teacher?' ('+teacher.code+')':'')+(room?' ['+room.name+']':'');})]);
  return(<div>
    <div className="pagehead"><div><h1 className="serif"><em>Timetable</em> Builder</h1><div className="sub">Red dot = teacher conflict. Yellow dot = room conflict. Click cell to assign subject + room.</div></div><div className="actions">
      <ExportBar title={'Timetable – '+(cls?cls.name:'')} headers={ttExpH} rows={ttExpR} subtitle={cls?cls.name:''}/>
      <button className="btn btn-ghost" onClick={autoFill}>Auto-fill</button><button className="btn btn-danger" onClick={clearClass}>Clear</button></div></div>
    <div className="tt-toolbar"><SearchSelect value={classId} options={clsOpts} onChange={setClassId} style={{minWidth:240}}/>
      {cls&&<span className={`badge ${cls.group==='primary'?'badge-ok':'badge-warn'}`}>{cls.group==='primary'?'PRIMARY':'UPPER'}</span>}
      <span style={{color:'var(--ink-muted)',fontSize:12.5}}>{Object.values(data.timetable[classId]||{}).reduce((s,d)=>s+Object.keys(d).length,0)}/{tCount*data.school.days.length} slots</span>
    </div>
    <div className="tt-grid" style={{'--cols':data.school.days.length}}>
      <div className="tt-row"><div className="tt-cell header">Period</div>{data.school.days.map(d=><div key={d} className="tt-cell header">{d.slice(0,3)}</div>)}</div>
      {pList.map((p,pi)=>(<div className="tt-row" key={pi}><div className="tt-cell time"><div style={{fontWeight:600,color:'var(--ink-soft)',fontSize:11}}>{p.name}</div><div>{p.start}–{p.end}</div></div>
        {data.school.days.map((_,di)=>{
          if(p.isBreak)return<div key={di} className="tt-cell break">{p.name}</div>;
          if(p.isAssembly)return<div key={di} className="tt-cell assembly">{p.name}</div>;
          if(p.isOrientation)return<div key={di} className="tt-cell orientation">{p.name}</div>;
          const cell=data.timetable[classId]&&data.timetable[classId][di]&&data.timetable[classId][di][pi];
          const subj=cell?data.subjects.find(s=>s.id===cell.subjectId):null;const teacher=cell?data.teachers.find(t=>t.id===cell.teacherId):null;
          const conType=conflicts[`${classId}|${di}|${pi}`];
          const conClass=conType==='teacher'||conType==='both'?'conflict':conType==='room'?'room-conflict':'';
          return<div key={di} className={`tt-cell ${!cell?'empty':''} ${conClass}`} style={subj?{background:subj.color+'10',borderLeft:`3px solid ${subj.color}`}:{}} onClick={()=>setPicker({d:di,p:pi})}>{cell&&subj?(<><div className="subj"><span className="chip-color" style={{background:subj.color}}></span>{subj.code}</div><div className="teach">{teacher?teacher.code:'--'}</div></>):'+ assign'}</div>;
        })}</div>))}
    </div>
    {picker&&<Picker data={data} classId={classId} picker={picker} pList={pList} onClose={()=>setPicker(null)} onPick={setCell}/>}
  </div>);
}
function Picker({data,classId,picker,pList,onClose,onPick}){
  const p=pList[picker.p];const day=data.school.days[picker.d];
  const currentCell=data.timetable[classId]&&data.timetable[classId][picker.d]&&data.timetable[classId][picker.d][picker.p];
  const[selRoom,setSelRoom]=useState(currentCell&&currentCell.roomId?currentCell.roomId:'');
  const roomOpts=[{value:'',label:'-- No Room --'},...(data.rooms||[]).map(r=>({value:r.id,label:r.name}))];

    <div className="modal-body">
      <div style={{marginBottom:12}}><label style={{display:'block',fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink-muted)',fontWeight:500,marginBottom:6}}>Room / Location</label>
        <SearchSelect value={selRoom} options={roomOpts} onChange={setSelRoom} placeholder="Select room..."/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      {data.subjects.map(s=>{const tId=data.allocations[allocKey(classId,s.id)];const teacher=tId?data.teachers.find(x=>x.id===tId):null;
        return<button key={s.id} onClick={()=>onPick(s.id,selRoom)} style={{textAlign:'left',padding:'10px 12px',border:'1px solid var(--line)',borderRadius:6,background:s.color+'10',borderLeft:`3px solid ${s.color}`,cursor:'pointer'}}><div style={{fontWeight:600,fontSize:13}}>{s.name}</div><div style={{fontSize:11,color:'var(--ink-muted)',marginTop:2}}>{teacher?teacher.code+' · '+teacher.name:'unallocated'}</div></button>;
      })}</div>

    <div className="modal-foot"><button className="btn btn-danger" onClick={()=>onPick(null,null)}>Clear</button><button className="btn btn-ghost" onClick={onClose}>Cancel</button></div>
  </div></div>);
}

// ===== Teacher Load =====
function LoadPage({data}){
  const priT=getTeachingCount(data.school.primaryPeriods);const upT=getTeachingCount(data.school.upperPeriods||data.school.primaryPeriods);const dc=data.school.days.length;
  const loads=useMemo(()=>data.teachers.map(t=>({teacher:t,...teacherLoad(t,data.timetable,data.classes,data.school)})),[data]);
  if(!data.teachers.length)return<div><div className="pagehead"><div><h1 className="serif"><em>Teacher Load</em></h1></div></div><div className="card"><div className="empty-state"><h3>No faculty</h3></div></div></div>;
  const sorted=[...loads].sort((a,b)=>b.total-a.total);const over=loads.filter(l=>l.total>l.teacher.maxPeriods).length;const avg=loads.length?Math.round(loads.reduce((s,l)=>s+l.total,0)/loads.length):0;
  const ldExpH=['Code','Name','Total','Max','Status','Subjects','Classes'];
  const ldExpR=sorted.map(l=>[l.teacher.code,l.teacher.name,l.total,l.teacher.maxPeriods,l.total>l.teacher.maxPeriods?'OVER':l.total>=l.teacher.maxPeriods*0.85?'FULL':'OK',Object.entries(l.bySubject).map(([sId,n])=>{const s=data.subjects.find(x=>x.id===sId);return s?s.code+'·'+n:'';}).join(', '),Object.entries(l.byClass).map(([cId,n])=>{const c=data.classes.find(x=>x.id===cId);return c?c.name+'·'+n:'';}).join(', ')]);
  return(<div>
    <div className="pagehead"><div><h1 className="serif">Teacher <em>Workload</em></h1></div>
      <ExportBar title="Teacher Workload" headers={ldExpH} rows={ldExpR}/>
    </div>
    <div className="grid-4" style={{marginBottom:24}}>
      <div className="stat"><div className="label">Avg Load</div><div className="val">{avg}</div><div className="delta">periods/week</div></div>
      <div className="stat"><div className="label">Periods/day</div><div className="val" style={{fontSize:24}}>{priT}P / {upT}U</div></div>
      <div className="stat"><div className="label">Overloaded</div><div className="val" style={{color:over?'var(--danger)':'var(--ink)'}}>{over}</div></div>
      <div className="stat"><div className="label">Faculty</div><div className="val">{data.teachers.length}</div></div>
    </div>
    <div className="card"><div className="card-title">Distribution</div>
      {sorted.map(l=>{const pct=(l.total/l.teacher.maxPeriods)*100;const cls=pct>100?'over':pct>=85?'full':pct>=50?'':'warn';const st=pct>100?'OVER':pct>=85?'FULL':pct>=50?'OK':'LOW';const sb=pct>100?'badge-err':pct>=85?'badge-ok':pct>=50?'':'badge-warn';
        return<div key={l.teacher.id} style={{marginBottom:12}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}><div><span style={{fontWeight:600}}>{l.teacher.name}</span><span className="mono" style={{color:'var(--ink-muted)',marginLeft:8,fontSize:12}}>{l.teacher.code}</span></div><div style={{display:'flex',alignItems:'center',gap:12}}><span className="mono" style={{fontSize:13}}>{l.total}/{l.teacher.maxPeriods}</span><span className={`badge ${sb}`}>{st}</span></div></div><div className="load-bar"><div className={`load-fill ${cls}`} style={{width:Math.min(pct,100)+'%'}}></div></div></div>;
      })}
    </div>
    <div className="card"><div className="card-title">Detailed</div><table><thead><tr><th>Teacher</th><th>Total</th><th>Subjects</th><th>Classes</th></tr></thead><tbody>
      {sorted.map(l=>(<tr key={l.teacher.id}><td><strong>{l.teacher.name}</strong></td><td className="mono">{l.total}</td>
        <td><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{Object.entries(l.bySubject).map(([sId,n])=>{const s=data.subjects.find(x=>x.id===sId);return s?<span key={sId} className="chip" style={{background:s.color+'18',color:s.color}}><span className="chip-color" style={{background:s.color}}></span>{s.code}·{n}</span>:null;})}{!Object.keys(l.bySubject).length&&<span style={{color:'var(--ink-muted)',fontSize:11,fontStyle:'italic'}}>none</span>}</div></td>
        <td><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{Object.entries(l.byClass).map(([cId,n])=>{const c=data.classes.find(x=>x.id===cId);return c?<span key={cId} className="chip">{c.name}·{n}</span>:null;})}</div></td></tr>))}
    </tbody></table></div>
  </div>);
}

// ===== Proxy Management =====
function ProxyPage({data,update}){
  const[dayIdx,setDayIdx]=useState(0);const[absentIds,setAbsentIds]=useState([]);const[assignments,setAssignments]=useState({});
  const toggleAbsent=id=>setAbsentIds(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);

  // Build absent teachers' schedules for the selected day
  const absentSchedules=useMemo(()=>{
    return absentIds.map(tId=>{const t=data.teachers.find(x=>x.id===tId);if(!t)return null;
      const sched=getTeacherScheduleForDay(tId,dayIdx,data.timetable,data.classes,data.school);
      return{teacher:t,schedule:sched};
    }).filter(Boolean);
  },[absentIds,dayIdx,data]);

  const assignProxy=(slotKey,proxyId)=>setAssignments(a=>({...a,[slotKey]:proxyId}));

  const printProxySlips=()=>{
    // Gather proxy assignments per proxy teacher
    const byProxy={};
    Object.entries(assignments).forEach(([key,proxyId])=>{if(!proxyId)return;
      const[absentId,pStart,pEnd,classId]=key.split('|');
      const absent=data.teachers.find(t=>t.id===absentId);const proxy=data.teachers.find(t=>t.id===proxyId);
      const cls=data.classes.find(c=>c.id===classId);const subj=data.subjects.find(s=>s.id===key.split('|')[4]);
      if(!proxy)return;if(!byProxy[proxyId])byProxy[proxyId]={teacher:proxy,slots:[]};
      byProxy[proxyId].slots.push({start:pStart,end:pEnd,className:cls?cls.name:'?',subjectName:subj?subj.name:'?',absentName:absent?absent.name:'?'});
    });
    // Open print window
    const dayName=data.school.days[dayIdx];const date=new Date().toLocaleDateString('en-IN');
    let html='<html><head><title>Proxy Slips</title><style>body{font-family:Arial,sans-serif;padding:20px}h2{margin:0 0 4px}table{width:100%;border-collapse:collapse;margin:8px 0 24px}th,td{border:1px solid #999;padding:8px;text-align:left;font-size:13px}th{background:#f0f0f0}.slip{page-break-after:always;padding:20px;border:2px solid #333;margin-bottom:24px;border-radius:8px}@media print{.slip{page-break-after:always}}</style></head><body>';
    html+='<div style="text-align:center;margin-bottom:20px"><h1>The World School, ICSE — Proxy Schedule</h1><p>'+dayName+' · '+date+'</p></div>';
    Object.values(byProxy).forEach(({teacher:pr,slots})=>{
      html+='<div class="slip"><h2>Proxy Slip for: '+pr.name+' ('+pr.code+')</h2><p style="color:#666;margin-bottom:8px">'+dayName+' · '+date+'</p><table><tr><th>Time</th><th>Class</th><th>Subject</th><th>Absent Teacher</th></tr>';
      slots.sort((a,b)=>a.start.localeCompare(b.start)).forEach(s=>{html+='<tr><td>'+s.start+'–'+s.end+'</td><td>'+s.className+'</td><td>'+s.subjectName+'</td><td>'+s.absentName+'</td></tr>';});
      html+='</table><div style="margin-top:24px;display:flex;justify-content:space-between"><div>Signature of Proxy Teacher: _______________</div><div>Coordinator: _______________</div></div></div>';
    });
    html+='</body></html>';
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };

  const dayOpts=data.school.days.map((d,i)=>({value:String(i),label:d}));
  const teacherOpts=data.teachers.map(t=>({value:t.id,label:t.code+' – '+t.name}));

  return(<div>
    <div className="pagehead"><div><h1 className="serif">Proxy <em>Management</em></h1><div className="sub">Mark absent teachers, view their schedule, assign free substitutes, and print proxy slips.</div></div>
      {Object.keys(assignments).length>0&&<div className="actions"><button className="btn btn-primary" onClick={printProxySlips}>Print Proxy Slips</button></div>}
    </div>

    <div className="card">
      <div className="grid-2">
        <div className="field"><label>Day</label><SearchSelect value={String(dayIdx)} options={dayOpts} onChange={v=>setDayIdx(Number(v))}/></div>
        <div className="field"><label>Add Absent Teacher</label>
          <SearchSelect value="" options={[{value:'',label:'-- Select teacher --'},...data.teachers.filter(t=>!absentIds.includes(t.id)).map(t=>({value:t.id,label:t.code+' – '+t.name}))]} onChange={v=>{if(v)setAbsentIds(a=>[...a,v])}} placeholder="Search by name or code..."/>
        </div>
      </div>
      {absentIds.length>0&&(<div style={{marginTop:12}}>
        <label style={{display:'block',fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink-muted)',fontWeight:500,marginBottom:6}}>Absent Today ({absentIds.length})</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {absentIds.map(id=>{const t=data.teachers.find(x=>x.id===id);return t?(<button key={id} onClick={()=>toggleAbsent(id)} className="btn btn-sm" style={{background:'var(--danger)',color:'white',borderColor:'var(--danger)'}}>{t.code} – {t.name} ×</button>):null;})}
        </div>
      </div>)}
    </div>

    {absentSchedules.length===0?(<div className="card"><div className="empty-state"><h3 className="serif">Select absent teachers above</h3><p>Their schedule for {data.school.days[dayIdx]} will appear here with proxy assignment dropdowns.</p></div></div>):(
      absentSchedules.map(({teacher:at,schedule})=>(
        <div className="card" key={at.id}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
            <div className="avatar" style={{background:'var(--danger-soft)',color:'var(--danger)'}}>{at.photo?<img src={at.photo} alt=""/>:at.code.slice(0,2)}</div>
            <div><div style={{fontWeight:600,fontSize:15}}>{at.name} <span className="mono" style={{color:'var(--ink-muted)',fontSize:12}}>{at.code}</span></div><div style={{fontSize:12,color:'var(--danger)'}}>Absent — {data.school.days[dayIdx]}</div></div>
          </div>
          {schedule.length===0?<div style={{color:'var(--ink-muted)',fontStyle:'italic',padding:'12px 0'}}>No classes scheduled for this day.</div>:(
            <table><thead><tr><th>Period</th><th>Time</th><th>Class</th><th>Subject</th><th>Assign Proxy</th></tr></thead><tbody>
              {schedule.map((sl,i)=>{
                const subj=data.subjects.find(s=>s.id===sl.subjectId);
                const slotKey=`${at.id}|${sl.start}|${sl.end}|${sl.classId}|${sl.subjectId}`;
                const freeTeachers=findFreeTeachers(dayIdx,sl.start,sl.end,data.timetable,data.classes,data.school,data.teachers,absentIds);
                const freeOpts=[{value:'',label:'-- Select Proxy --'},...freeTeachers.map(t=>({value:t.id,label:t.code+' – '+t.name}))];
                const assigned=assignments[slotKey];
                return(<tr key={i}><td style={{fontWeight:600}}>{sl.name}</td><td className="mono">{sl.start}–{sl.end}</td><td>{sl.className}</td><td>{subj?<span className="chip" style={{background:subj.color+'22',color:subj.color}}><span className="chip-color" style={{background:subj.color}}></span>{subj.code}</span>:'--'}</td>
                  <td><SearchSelect value={assigned||''} options={freeOpts} onChange={v=>assignProxy(slotKey,v)} placeholder="Select proxy..."/></td></tr>);
              })}
            </tbody></table>
          )}
        </div>
      ))
    )}

    {Object.keys(assignments).filter(k=>assignments[k]).length>0&&(
      <div className="card"><div className="card-title">Proxy Summary</div>
        <table><thead><tr><th>Proxy Teacher</th><th>Period</th><th>Class</th><th>For (Absent)</th></tr></thead><tbody>
          {Object.entries(assignments).filter(([k,v])=>v).map(([key,proxyId])=>{
            const parts=key.split('|');const absent=data.teachers.find(t=>t.id===parts[0]);const proxy=data.teachers.find(t=>t.id===proxyId);
            const cls=data.classes.find(c=>c.id===parts[3]);
            return<tr key={key}><td style={{fontWeight:600}}>{proxy?proxy.name:'?'}</td><td className="mono">{parts[1]}–{parts[2]}</td><td>{cls?cls.name:'?'}</td><td>{absent?absent.name:'?'}</td></tr>;
          })}
        </tbody></table>
      </div>
    )}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
