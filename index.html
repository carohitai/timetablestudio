  </div>);
}

// ===== Timetable =====
function TimetablePage({data,update}){
  // Timetable Builder decouples ONLY the working-days list from Day Structure
  // (TB_DAYS is always Mon-Sat), so removing Saturday in the working-days
  // picker cannot hide saved Saturday slots here. Per-standard period grids
  // (durations, start/end, recess order) and the active session are read
  // from data.school so edits made in Day Structure propagate immediately,
  // per standard.
  const TB_DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const[classId,setClassId]=useState(data.classes[0]?data.classes[0].id:'');const[picker,setPicker]=useState(null);
  const[dayFilter,setDayFilter]=useState([]); // array of selected day indices; empty = All Days
  const[swapAnchor,setSwapAnchor]=useState(null); // {d,p} first cell picked with Shift+click
  const toggleDay=i=>setDayFilter(a=>a.includes(i)?a.filter(x=>x!==i):[...a,i].sort((x,y)=>x-y));
  const selectAllDays=()=>setDayFilter([]);
  const showingAll=!dayFilter.length||dayFilter.length===TB_DAYS.length;
  // Effective school for conflict detection + getPeriodsForClass: same as
  // data.school but with the fixed Mon-Sat day list.
  const tbSchool=useMemo(()=>({...data.school,days:TB_DAYS}),[data.school]);
  const conflicts=useMemo(()=>findConflicts(data.timetable,data.classes,tbSchool),[data.timetable,data.classes,tbSchool]);
  useEffect(()=>{if(!classId&&data.classes[0])setClassId(data.classes[0].id);},[data.classes,classId]);

  // Session switcher — writes back to data.school so Day Structure and
  // Timetable Builder stay in sync on session changes from either tab.
  const switchSession=k=>{const pr=SESSION_PRESETS[k];update({school:{...data.school,activeSession:k,preprimaryPeriods:buildSessionPeriods(pr.preprimary),primaryPeriods:buildSessionPeriods(pr.primary),upperPeriods:buildSessionPeriods(pr.upper),preprimaryStart:pr.preprimary.startTime,primaryStart:pr.primary.startTime,upperStart:pr.upper.startTime}});};
  const activeSession=data.school.activeSession||'normal';

  if(!data.classes.length)return<div><div className="pagehead"><div><h1 className="serif"><em>Timetable</em></h1></div></div><div className="card"><div className="empty-state"><h3>Add classes first</h3></div></div></div>;
  const cls=data.classes.find(c=>c.id===classId);
  // Per-day period lookup for the currently-selected class. Each day uses the
  // period grid of its own day-category (weekdays / activity / bagless).
  const periodsFor=(dIdx)=>cls?getPeriodsForClassDay(tbSchool,cls,TB_DAYS[dIdx]):data.school.primaryPeriods||[];
  const tSlotsTotal=TB_DAYS.reduce((s,_,i)=>s+getTeachingCount(periodsFor(i)),0);
  const setCell=(sId,roomId)=>{if(!picker)return;const tId=sId?data.allocations[allocKey(classId,sId)]:null;const tt=JSON.parse(JSON.stringify(data.timetable));if(!tt[classId])tt[classId]={};if(!tt[classId][picker.d])tt[classId][picker.d]={};if(sId)tt[classId][picker.d][picker.p]={subjectId:sId,teacherId:tId||null,roomId:roomId||null};else delete tt[classId][picker.d][picker.p];update({timetable:tt},'Assigned to '+(data.school.days||[])[picker.d]+' P'+(picker.p+1));setPicker(null);};
  // Shift+click → swap. First shifted cell becomes the anchor; second shifted
  // cell swaps contents with the anchor.
  const onCellClick=(e,d,p)=>{
    if(e.shiftKey){
      if(!swapAnchor){setSwapAnchor({d,p});return;}
      if(swapAnchor.d===d&&swapAnchor.p===p){setSwapAnchor(null);return;}
      const tt=JSON.parse(JSON.stringify(data.timetable));
      if(!tt[classId])tt[classId]={};
      const a=(tt[classId][swapAnchor.d]&&tt[classId][swapAnchor.d][swapAnchor.p])||null;
      const b=(tt[classId][d]&&tt[classId][d][p])||null;
      if(!tt[classId][swapAnchor.d])tt[classId][swapAnchor.d]={};
      if(!tt[classId][d])tt[classId][d]={};
      if(b)tt[classId][swapAnchor.d][swapAnchor.p]=b;else delete tt[classId][swapAnchor.d][swapAnchor.p];
      if(a)tt[classId][d][p]=a;else delete tt[classId][d][p];
      update({timetable:tt},'Swapped two cells');
      setSwapAnchor(null);
      return;
    }
    setSwapAnchor(null);
    setPicker({d,p});
  };
  const clearClass=()=>{if(!confirm('Clear?'))return;const tt={...data.timetable};delete tt[classId];update({timetable:tt});};

  // Conflict-aware auto-fill: iterates each day using THAT day's category periods
  const autoFill=()=>{
    const al=Object.entries(data.allocations).filter(([k])=>k.startsWith(classId+'|'));
    if(!al.length){alert('No allocations for this class.');return;}
    const ws=tSlotsTotal;
    if(!ws){alert('No teaching slots available — check Day Structure period grids.');return;}
    const cnt={};const ps=Math.floor(ws/al.length);
    al.forEach(([k])=>cnt[k.split('|')[1]]=ps);
    let rem=ws-ps*al.length;
    al.forEach(([k])=>{if(rem>0){cnt[k.split('|')[1]]++;rem--;}});
    const pool=[];
    Object.entries(cnt).forEach(([sId,n])=>{
      const tId=data.allocations[allocKey(classId,sId)]||null;
      for(let i=0;i<n;i++) pool.push({subjectId:sId,teacherId:tId});
    });
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    // Busy map uses each existing cell's OWN day-category periods for the lookup.
    const busyMap={};
    data.classes.forEach(c=>{
      if(c.id===classId) return;
      const cTT=data.timetable[c.id]||{};
      Object.keys(cTT).forEach(dIdx=>{
        const dayName=TB_DAYS[Number(dIdx)];
        if(!dayName) return;
        const cPList=getPeriodsForClassDay(tbSchool,c,dayName);
        Object.keys(cTT[dIdx]||{}).forEach(pIdx=>{
          const cell=cTT[dIdx][pIdx];
          if(!cell||!cell.teacherId) return;
          const p=cPList[Number(pIdx)];
          if(!p||isNonTeaching(p)) return;
          const key=dIdx+'|'+p.start+'|'+p.end;
          if(!busyMap[key]) busyMap[key]=new Set();
          busyMap[key].add(cell.teacherId);
        });
      });
    });
    // Teaching positions for THIS class — per day, using that day's category grid.
    const positions=[];
    TB_DAYS.forEach((dayName,dIdx)=>{
      const dayPeriods=getPeriodsForClassDay(tbSchool,cls,dayName);
      dayPeriods.forEach((p,pIdx)=>{if(!isNonTeaching(p)) positions.push({dIdx,pIdx,start:p.start,end:p.end});});
    });
    const tt=JSON.parse(JSON.stringify(data.timetable));
    if(!tt[classId]) tt[classId]={};
    // Also track what we place in this run so we don't self-conflict
    const placed={};
    let skipped=0;
    const poolCopy=[...pool];
    // Helper: check if lecture-based teacher is available at this time
    const isTeacherAvailable=(tId,start,end)=>{
      const t=data.teachers.find(x=>x.id===tId);
      if(!t||t.teacherType!=='lecture_based') return true;
      if(!t.availFrom||!t.availTo) return true;
      return start>=t.availFrom&&end<=t.availTo;
    };
    // First lecture of each day = default first subject (if set) else class teacher
    const firstSubjectId=cls?cls.firstSubjectId:null;
    const classTeacherId=cls?cls.classTeacherId:null;
    const firstPosPerDay={};
    positions.forEach(pos=>{if(firstPosPerDay[pos.dIdx]===undefined)firstPosPerDay[pos.dIdx]=pos;});

    positions.forEach(({dIdx,pIdx,start,end})=>{
      const busyKey=dIdx+'|'+start+'|'+end;
      const busySet=busyMap[busyKey]||new Set();
      const selfBusy=placed[busyKey]||new Set();
      // First teaching period of each day
      const isFirstPeriod=firstPosPerDay[dIdx]&&firstPosPerDay[dIdx].pIdx===pIdx;
      // (a) Explicit class default first-subject takes top priority
      if(isFirstPeriod&&firstSubjectId&&poolCopy.length>0){
        const fsIdx=poolCopy.findIndex(item=>item.subjectId===firstSubjectId&&(!item.teacherId||(!busySet.has(item.teacherId)&&!selfBusy.has(item.teacherId)&&isTeacherAvailable(item.teacherId,start,end))));
        if(fsIdx!==-1){
          const item=poolCopy.splice(fsIdx,1)[0];
          if(!tt[classId][dIdx]) tt[classId][dIdx]={};
          tt[classId][dIdx][pIdx]={subjectId:item.subjectId,teacherId:item.teacherId,roomId:null};
          if(item.teacherId){if(!placed[busyKey])placed[busyKey]=new Set();placed[busyKey].add(item.teacherId);}
          return;
        }
        // If no pool entry matched (e.g. firstSubject isn't allocated), fall through to class-teacher logic
      }
      // (b) Otherwise prefer a subject taught by the class teacher
      if(isFirstPeriod&&classTeacherId&&poolCopy.length>0){
        const ctIdx=poolCopy.findIndex(item=>item.teacherId===classTeacherId&&!busySet.has(item.teacherId)&&!selfBusy.has(item.teacherId)&&isTeacherAvailable(item.teacherId,start,end));
        if(ctIdx!==-1){
          const item=poolCopy.splice(ctIdx,1)[0];
          if(!tt[classId][dIdx]) tt[classId][dIdx]={};
          tt[classId][dIdx][pIdx]={subjectId:item.subjectId,teacherId:item.teacherId,roomId:null};
          if(item.teacherId){if(!placed[busyKey])placed[busyKey]=new Set();placed[busyKey].add(item.teacherId);}
          return;
        }
      }
      // Find first item from pool whose teacher is NOT busy and is available
      let found=-1;
      for(let i=0;i<poolCopy.length;i++){
        const item=poolCopy[i];
        if(!item.teacherId || (!busySet.has(item.teacherId)&&!selfBusy.has(item.teacherId)&&isTeacherAvailable(item.teacherId,start,end))){
          found=i;break;
        }
      }
      if(found===-1){
        if(poolCopy.length>0){
          const item=poolCopy.splice(0,1)[0];
          if(!tt[classId][dIdx]) tt[classId][dIdx]={};
          tt[classId][dIdx][pIdx]={subjectId:item.subjectId,teacherId:null,roomId:null};
          skipped++;
        }
        return;
      }
      const item=poolCopy.splice(found,1)[0];
      if(!tt[classId][dIdx]) tt[classId][dIdx]={};
      tt[classId][dIdx][pIdx]={subjectId:item.subjectId,teacherId:item.teacherId,roomId:null};
      if(item.teacherId){
        if(!placed[busyKey]) placed[busyKey]=new Set();
        placed[busyKey].add(item.teacherId);
      }
    });
    update({timetable:tt});
    if(skipped>0) alert(skipped+' slot(s) had all teachers busy — placed subject without teacher. Review manually.');
  };

  const clsOpts=sortClasses(data.classes).map(c=>({value:c.id,label:c.name+' ('+(c.group==='preprimary'?'Pre-Pri':c.group==='upper'?'Upper':'Primary')+')'}));
  // Export flattens across categories — one table row per (category, period) combination.
  const visibleIndices=showingAll?TB_DAYS.map((_,i)=>i):dayFilter.slice();
  const catDaysInView={};
  visibleIndices.forEach(di=>{const dayName=TB_DAYS[di];const cat=getCategoryForDay(tbSchool,dayName);if(!catDaysInView[cat])catDaysInView[cat]={dayIdxs:[],periods:cls?getPeriodsForClassDay(tbSchool,cls,dayName):[]};catDaysInView[cat].dayIdxs.push(di);});
  const CAT_ORDER=['weekdays','activity','bagless'];
  const orderedCats=CAT_ORDER.filter(c=>catDaysInView[c]);
  const ttExpH=['Category','Period',...TB_DAYS.map(d=>d.slice(0,3))];
  const ttExpR=[];
  orderedCats.forEach(cat=>{
    const{dayIdxs,periods}=catDaysInView[cat];
    periods.forEach((p,pi)=>{
      const row=[DAY_CATEGORY_LABELS[cat]||cat,p.name+' ('+p.start+'–'+p.end+')'];
      TB_DAYS.forEach((dName,di)=>{
        if(!dayIdxs.includes(di)){row.push('—');return;}
        if(isNonTeaching(p)){row.push(p.name);return;}
        const cell=data.timetable[classId]&&data.timetable[classId][di]&&data.timetable[classId][di][pi];
        if(!cell){row.push('');return;}
        const subj=data.subjects.find(s=>s.id===cell.subjectId);
        const teacher=data.teachers.find(t=>t.id===cell.teacherId);
        const room=cell.roomId?(data.rooms||[]).find(r=>r.id===cell.roomId):null;
        row.push((subj?subj.code:'')+(teacher?' ('+teacher.code+')':'')+(room?' ['+room.name+']':''));
      });
      ttExpR.push(row);
    });
  });
  // Weighted sums across each day's category periods
  const totalTeachMin=TB_DAYS.reduce((s,_,i)=>{const pr=periodsFor(i);return s+pr.filter(p=>!isNonTeaching(p)).reduce((a,p)=>a+(p.duration||0),0);},0);
  const totalDayMin=TB_DAYS.reduce((s,_,i)=>{const pr=periodsFor(i);return s+pr.reduce((a,p)=>a+(p.duration||0),0);},0);
  const conflictCount=Object.keys(conflicts).filter(k=>k.startsWith(classId+'|')).length;
  return(<div>
    <div className="pagehead"><div><h1 className="serif"><em>Timetable</em> Builder</h1><div className="sub">Always Mon–Sat, rendered as per-category blocks. Weekdays / Activity / Bag Less each use their own period grid from Day Structure. Red dot = teacher conflict. Yellow dot = room conflict.</div></div><div className="actions">
      <ExportBar title={'Timetable – '+(cls?cls.name:'')} headers={ttExpH} rows={ttExpR} subtitle={cls?cls.name:''}/>
      <button className="btn btn-ghost" onClick={autoFill}>Auto-fill</button><button className="btn btn-danger" onClick={clearClass}>Clear</button></div></div>

    <div className="card no-print" style={{padding:'14px 20px',marginBottom:16}}>
      <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:500,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>Session:</span>
        <div className="tab-bar">
          {Object.entries(SESSION_PRESETS).map(([k,pr])=>(<button key={k} className={`tab-btn ${activeSession===k?'active':''}`} onClick={()=>switchSession(k)}>{pr.label}</button>))}
        </div>
        <span style={{fontSize:12,color:'var(--ink-muted)'}}>Teaching: {totalTeachMin} min / week | Day: {totalDayMin} min ({Math.floor(totalDayMin/60)}h {totalDayMin%60}m)</span>
        {conflictCount>0&&<span className="badge badge-err">{conflictCount} conflicts</span>}
      </div>
    </div>

    <div className="tt-toolbar"><SearchSelect value={classId} options={clsOpts} onChange={setClassId} style={{minWidth:240}}/>
      {cls&&<span className={`badge ${cls.group==='preprimary'?'':cls.group==='primary'?'badge-ok':'badge-warn'}`}>{cls.group==='preprimary'?'PRE-PRIMARY':cls.group==='primary'?'PRIMARY':'UPPER'}</span>}
      <span style={{color:'var(--ink-muted)',fontSize:12.5}}>{Object.values(data.timetable[classId]||{}).reduce((s,d)=>s+Object.keys(d).length,0)}/{tSlotsTotal} slots</span>
    </div>
    {(()=>{const weekdayIdxs=TB_DAYS.map((d,i)=>[d,i]).filter(([d])=>getCategoryForDay(data.school,d)==='weekdays').map(([,i])=>i);
      const activityIdxs=TB_DAYS.map((d,i)=>[d,i]).filter(([d])=>getCategoryForDay(data.school,d)==='activity').map(([,i])=>i);
      const baglessIdxs=TB_DAYS.map((d,i)=>[d,i]).filter(([d])=>getCategoryForDay(data.school,d)==='bagless').map(([,i])=>i);
      const eqSet=(a,b)=>a.length===b.length&&a.every(x=>b.includes(x));
      const onWeekdays=!showingAll&&eqSet(dayFilter,weekdayIdxs);
      const onActivity=!showingAll&&eqSet(dayFilter,activityIdxs);
      const onBagless=!showingAll&&eqSet(dayFilter,baglessIdxs);
      return(
    <div className="tt-toolbar no-print" style={{marginTop:-4}}>
      <span style={{fontSize:11,fontWeight:500,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>View:</span>
      <div className="tab-bar" style={{flexWrap:'wrap'}}>
        <button className={`tab-btn ${showingAll?'active':''}`} onClick={selectAllDays}>All Days</button>
        <button className={`tab-btn ${onWeekdays?'active':''}`} disabled={!weekdayIdxs.length} onClick={()=>setDayFilter(weekdayIdxs)}>Weekdays{weekdayIdxs.length?' ('+weekdayIdxs.length+')':''}</button>
        <button className={`tab-btn ${onActivity?'active':''}`} disabled={!activityIdxs.length} onClick={()=>setDayFilter(activityIdxs)}>Activity Days{activityIdxs.length?' ('+activityIdxs.length+')':''}</button>
        {baglessIdxs.length>0&&<button className={`tab-btn ${onBagless?'active':''}`} onClick={()=>setDayFilter(baglessIdxs)}>Bag Less ({baglessIdxs.length})</button>}
      </div>
      <span style={{fontSize:11,color:'var(--ink-muted)'}}>{showingAll?'All '+TB_DAYS.length+' days':dayFilter.length+' of '+TB_DAYS.length+' days'}</span>
      <span style={{marginLeft:'auto',fontSize:10.5,color:swapAnchor?'var(--warm)':'var(--ink-muted)',fontWeight:swapAnchor?600:400}}>{swapAnchor?'⇆ Swap anchor set · Shift+click another cell':'Tip: click to edit · Shift+click two cells to swap'}</span>
    </div>
      );
    })()}
    {orderedCats.length===0&&<div className="card"><div className="empty-state"><h3 className="serif">No days visible</h3><p>Toggle a day above to see its grid.</p></div></div>}
    {orderedCats.map(cat=>{
      const{dayIdxs,periods}=catDaysInView[cat];
      const catLabel=DAY_CATEGORY_LABELS[cat]||cat;
      const catColor=cat==='weekdays'?'var(--accent)':cat==='activity'?'var(--warm)':'var(--ink-soft)';
      return(<div key={cat} style={{marginBottom:18}}>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'4px 2px 8px'}}>
          <span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:catColor}}>{catLabel}</span>
          <span style={{fontSize:11.5,color:'var(--ink-muted)'}}>{dayIdxs.map(i=>TB_DAYS[i].slice(0,3)).join(' · ')} · {getTeachingCount(periods)} teaching periods</span>
        </div>
        {!periods.length?<div style={{padding:14,border:'1px dashed var(--line)',borderRadius:8,color:'var(--ink-muted)',fontSize:12.5,fontStyle:'italic'}}>No period grid configured for {catLabel}. Go to Day Structure → {catLabel} → {cls?(cls.group==='preprimary'?'Pre-Primary':cls.group==='upper'?'Upper':'Primary'):'the class group'} and add periods.</div>:
        <div className="tt-grid" style={{'--cols':dayIdxs.length}}>
          <div className="tt-row"><div className="tt-cell header">Period</div>{dayIdxs.map(di=><div key={di} className="tt-cell header">{TB_DAYS[di]}</div>)}</div>
          {periods.map((p,pi)=>(<div className="tt-row" key={pi}><div className="tt-cell time"><div style={{fontWeight:600,color:'var(--ink-soft)',fontSize:11}}>{p.name}</div><div>{p.start}–{p.end}</div></div>
            {dayIdxs.map(di=>{
              const effective=inferredType(p);
              if(effective==='break')return<div key={di} className="tt-cell break">{p.name}</div>;
              if(effective==='assembly')return<div key={di} className="tt-cell assembly">{p.name}</div>;
              if(effective==='orientation')return<div key={di} className="tt-cell orientation">{p.name}</div>;
              const cell=data.timetable[classId]&&data.timetable[classId][di]&&data.timetable[classId][di][pi];
              const subj=cell?data.subjects.find(s=>s.id===cell.subjectId):null;const teacher=cell?data.teachers.find(t=>t.id===cell.teacherId):null;
              const conType=conflicts[`${classId}|${di}|${pi}`];
              const conClass=conType==='teacher'||conType==='both'?'conflict':conType==='room'?'room-conflict':'';
              const isAnchor=swapAnchor&&swapAnchor.d===di&&swapAnchor.p===pi;
              const anchorStyle=isAnchor?{outline:'2px dashed var(--warm)',outlineOffset:'-2px'}:{};
              return<div key={di} className={`tt-cell ${!cell?'empty':''} ${conClass}`} style={{...(subj?{background:subj.color+'10',borderLeft:`3px solid ${subj.color}`}:{}),...anchorStyle}} onClick={e=>onCellClick(e,di,pi)} title={swapAnchor?'Shift+click to swap with anchor':'Click to edit · Shift+click to swap'}>{cell&&subj?(<><div className="subj"><span className="chip-color" style={{background:subj.color}}></span>{subj.code}</div><div className="teach">{teacher?teacher.code:'--'}</div></>):'+ assign'}</div>;
            })}</div>))}
        </div>}
      </div>);
    })}
    {picker&&<Picker data={data} dayNames={TB_DAYS} classId={classId} picker={picker} pList={periodsFor(picker.d)} onClose={()=>setPicker(null)} onPick={setCell}/>}
  </div>);
}
function Picker({data,dayNames,classId,picker,pList,onClose,onPick}){
  const p=pList[picker.p];const day=(dayNames||data.school.days)[picker.d];
  const currentCell=data.timetable[classId]&&data.timetable[classId][picker.d]&&data.timetable[classId][picker.d][picker.p];
  const[selRoom,setSelRoom]=useState(currentCell&&currentCell.roomId?currentCell.roomId:'');
  const roomOpts=[{value:'',label:'-- No Room --'},...(data.rooms||[]).map(r=>({value:r.id,label:r.name}))];
  return(<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-head"><div style={{fontSize:11,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--ink-muted)',marginBottom:4}}>{day} · {p.name} ({p.start}–{p.end})</div><h3 className="serif">Pick a <em>subject</em></h3></div>
    <div className="modal-body">
      <div style={{marginBottom:12}}><label style={{display:'block',fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink-muted)',fontWeight:500,marginBottom:6}}>Room / Location</label>
        <SearchSelect value={selRoom} options={roomOpts} onChange={setSelRoom} placeholder="Select room..."/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      {data.subjects.map(s=>{const tId=data.allocations[allocKey(classId,s.id)];const teacher=tId?data.teachers.find(x=>x.id===tId):null;
        return<button key={s.id} onClick={()=>onPick(s.id,selRoom)} style={{textAlign:'left',padding:'10px 12px',border:'1px solid var(--line)',borderRadius:6,background:s.color+'10',borderLeft:`3px solid ${s.color}`,cursor:'pointer'}}><div style={{fontWeight:600,fontSize:13}}>{s.name}</div><div style={{fontSize:11,color:'var(--ink-muted)',marginTop:2}}>{teacher?teacher.code+' · '+teacher.name:'unallocated'}</div></button>;
      })}</div>
    </div>
    <div className="modal-foot"><button className="btn btn-danger" onClick={()=>onPick(null,null)}>Clear</button><button className="btn btn-ghost" onClick={onClose}>Cancel</button></div>
  </div></div>);
}

// ===== Teacher Load =====
function LoadPage({data}){
  const priT=getTeachingCount(data.school.primaryPeriods);const upT=getTeachingCount(data.school.upperPeriods||data.school.primaryPeriods);
  const loads=useMemo(()=>data.teachers.map(t=>({teacher:t,...teacherLoad(t,data.timetable,data.classes,data.school)})),[data]);
  const[selTeacher,setSelTeacher]=useState('');
  const[view,setView]=useState('week'); // day | week | month | session | year
  const[dayIdx,setDayIdx]=useState(0);
  const[sessionPreview,setSessionPreview]=useState(data.school.activeSession||'normal');
  const ptRef=React.useRef(null);
  if(!data.teachers.length)return<div><div className="pagehead"><div><h1 className="serif"><em>Teacher Load</em></h1></div></div><div className="card"><div className="empty-state"><h3>No faculty</h3></div></div></div>;
  const sorted=[...loads].sort((a,b)=>b.total-a.total);const over=loads.filter(l=>l.total>l.teacher.maxPeriods).length;const avg=loads.length?Math.round(loads.reduce((s,l)=>s+l.total,0)/loads.length):0;
  const openTeacher=tId=>{setSelTeacher(tId);if(ptRef.current)ptRef.current.scrollIntoView({behavior:'smooth',block:'start'});};
  const getSubjDuration=(load)=>{
    return Object.entries(load.bySubject).map(([sId,count])=>{
      const s=data.subjects.find(x=>x.id===sId);if(!s)return null;
      let totalDur=0,cnt=0;
      data.classes.forEach(cls=>{const pl=getPeriodsForClass(data.school,cls);pl.filter(p=>!isNonTeaching(p)).forEach(p=>{totalDur+=(p.duration||35);cnt++;});});
      const avgDur=cnt?Math.round(totalDur/cnt):35;
      return{code:s.code,name:s.name,color:s.color,count,duration:count*avgDur};
    }).filter(Boolean);
  };
  const selT=data.teachers.find(t=>t.id===selTeacher);
  const tOpts=[{value:'',label:'-- Select Teacher --'},...data.teachers.map(t=>({value:t.id,label:t.code+' – '+t.name}))];
  const ldExpH=['Code','Name','Total','Max','Status','Subjects (count × min)','Classes'];
  const ldExpR=sorted.map(l=>[l.teacher.code,l.teacher.name,l.total,l.teacher.maxPeriods,l.total>l.teacher.maxPeriods?'OVER':'OK',getSubjDuration(l).map(s=>s.code+': '+s.count+'×'+(s.duration/s.count)+'m='+s.duration+'m').join(', '),Object.entries(l.byClass).map(([cId,n])=>{const c=data.classes.find(x=>x.id===cId);return c?c.name+'·'+n:'';}).join(', ')]);
  return(<div>
    <div className="pagehead"><div><h1 className="serif">Teacher <em>Workload</em></h1><div className="sub">Click any teacher row to open their personal timetable below — Day / Week / Month / Session / Academic Year views.</div></div>
      <ExportBar title="Teacher Workload" headers={ldExpH} rows={ldExpR}/>
    </div>
    <div className="grid-4" style={{marginBottom:24}}>
      <div className="stat"><div className="label">Avg Load</div><div className="val">{avg}</div><div className="delta">periods/week</div></div>
      <div className="stat"><div className="label">Periods/day</div><div className="val" style={{fontSize:24}}>{priT}P / {upT}U</div></div>
      <div className="stat"><div className="label">Overloaded</div><div className="val" style={{color:over?'var(--danger)':'var(--ink)'}}>{over}</div></div>
      <div className="stat"><div className="label">Faculty</div><div className="val">{data.teachers.length}</div></div>
    </div>
    <div className="card"><div className="card-title">Distribution with Duration</div>
      {sorted.map(l=>{const pct=(l.total/l.teacher.maxPeriods)*100;const cls2=pct>100?'over':pct>=85?'full':pct>=50?'':'warn';const st=pct>100?'OVER':pct>=85?'FULL':pct>=50?'OK':'LOW';const sb=pct>100?'badge-err':pct>=85?'badge-ok':pct>=50?'':'badge-warn';
        const subjDur=getSubjDuration(l);
        const isSel=selTeacher===l.teacher.id;
        return<div key={l.teacher.id} onClick={()=>openTeacher(l.teacher.id)} style={{marginBottom:16,paddingBottom:12,borderBottom:'1px solid var(--line-soft)',cursor:'pointer',padding:'8px 10px',borderRadius:6,background:isSel?'rgba(13,79,60,0.06)':'transparent',transition:'background .12s'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}><div><span style={{fontWeight:600}}>{l.teacher.name}</span><span className="mono" style={{color:'var(--ink-muted)',marginLeft:8,fontSize:12}}>{l.teacher.code}</span>{l.teacher.teacherType!=='regular'&&<span className="badge" style={{marginLeft:6}}>{l.teacher.teacherType==='lecture_based'?'LEC':'ACT'}</span>}</div><div style={{display:'flex',alignItems:'center',gap:12}}><span className="mono" style={{fontSize:13}}>{l.total}/{l.teacher.maxPeriods}</span><span className={`badge ${sb}`}>{st}</span></div></div>
          <div className="load-bar"><div className={`load-fill ${cls2}`} style={{width:Math.min(pct,100)+'%'}}></div></div>
          {subjDur.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:6}}>{subjDur.map(sd=>(<span key={sd.code} className="chip" style={{background:sd.color+'18',color:sd.color,fontSize:11}}><span className="chip-color" style={{background:sd.color}}></span>{sd.code}: {sd.count} × {Math.round(sd.duration/sd.count)}m = {sd.duration}m</span>))}</div>}
        </div>;
      })}
    </div>
    <div className="card" ref={ptRef}>
      <div className="card-title">Personal Timetable</div>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
        <SearchSelect value={selTeacher} options={tOpts} onChange={setSelTeacher} style={{minWidth:260}}/>
        <div className="tab-bar">
          <button className={`tab-btn ${view==='day'?'active':''}`} onClick={()=>setView('day')}>Day</button>
          <button className={`tab-btn ${view==='week'?'active':''}`} onClick={()=>setView('week')}>Week</button>
          <button className={`tab-btn ${view==='month'?'active':''}`} onClick={()=>setView('month')}>Month</button>
          <button className={`tab-btn ${view==='session'?'active':''}`} onClick={()=>setView('session')}>Session</button>
          <button className={`tab-btn ${view==='year'?'active':''}`} onClick={()=>setView('year')}>Academic Year</button>
        </div>
        {view==='day'&&<SearchSelect value={String(dayIdx)} options={(data.school.days||[]).map((d,i)=>({value:String(i),label:d}))} onChange={v=>setDayIdx(Number(v))} style={{minWidth:140}}/>}
        {view==='session'&&<SearchSelect value={sessionPreview} options={Object.entries(SESSION_PRESETS).map(([k,pr])=>({value:k,label:pr.label}))} onChange={setSessionPreview} style={{minWidth:140}}/>}
      </div>
      {selT?(()=>{
        const schedByDay=(data.school.days||[]).map((_,di)=>getTeacherScheduleForDay(selT.id,di,data.timetable,data.classes,data.school));
        const weekCount=schedByDay.reduce((s,a)=>s+a.length,0);
        const weekMins=schedByDay.reduce((s,a)=>s+a.reduce((ss,sl)=>ss+(timeDiff(sl.start,sl.end)),0),0);
        // Always-on summary: subject-wise + standard-wise counts (per week).
        const bySubjectWk={};schedByDay.forEach(arr=>arr.forEach(sl=>{bySubjectWk[sl.subjectId]=(bySubjectWk[sl.subjectId]||0)+1;}));
        const byClassWk={};schedByDay.forEach(arr=>arr.forEach(sl=>{byClassWk[sl.classId]=(byClassWk[sl.classId]||0)+1;}));
        const subjectSummary=Object.entries(bySubjectWk).map(([sId,n])=>{const s=data.subjects.find(x=>x.id===sId);return{sId,n,s};}).filter(x=>x.s).sort((a,b)=>b.n-a.n);
        const classSummary=sortClasses(Object.entries(byClassWk).map(([cId,n])=>({cId,n,...(data.classes.find(x=>x.id===cId)||{})})));
        // Build export payload based on the current view
        const tsub=selT.name+' ('+selT.code+')';
        const daysArr=data.school.days||[];
        let expTitle='Personal Timetable', expSub=tsub, expH=[], expR=[];
        if(view==='day'){
          const day=daysArr[dayIdx]||'Day';
          const sched=schedByDay[dayIdx]||[];
          expTitle='Personal Timetable – '+day;
          expH=['Time','Period','Class','Subject'];
          expR=sched.map(sl=>{const subj=data.subjects.find(s=>s.id===sl.subjectId);return[sl.start+'–'+sl.end,sl.name,sl.className,subj?subj.code+' – '+subj.name:'—'];});
        } else if(view==='week'){
          const allPeriodSets=data.classes.map(c=>getPeriodsForClass(data.school,c));
          const maxPeriods=Math.max(...allPeriodSets.map(p=>p.length),1);
          expTitle='Personal Timetable – Week';
          expH=['Period',...daysArr.map(d=>d.slice(0,3))];
          expR=Array.from({length:maxPeriods}).map((_,pi)=>['P'+(pi+1),...daysArr.map((_,di)=>{const slot=(schedByDay[di]||[]).find(s=>s.periodIdx===pi);if(!slot)return'';const subj=data.subjects.find(s=>s.id===slot.subjectId);return(subj?subj.code:'?')+' · '+slot.className;})]);
        } else if(view==='month'){
          const weeksInMonth=4;
          expTitle='Personal Timetable – Month';
          expSub=tsub+' · '+weekCount+' periods/week · ~'+weeksInMonth+' teaching weeks';
          expH=['Subject','Code','Per Week','Per Month (x'+weeksInMonth+')'];
          expR=subjectSummary.map(x=>[x.s.name,x.s.code,x.n,x.n*weeksInMonth]);
        } else if(view==='session'){
          const pr=SESSION_PRESETS[sessionPreview];
          expTitle='Personal Timetable – '+(pr?pr.label:'Session')+' Preview';
          expH=['Day','Periods','Subjects'];
          expR=daysArr.map((d,di)=>{const sc=schedByDay[di]||[];return[d,sc.length,sc.map(sl=>{const subj=data.subjects.find(s=>s.id===sl.subjectId);return(subj?subj.code:'?')+' ('+sl.className+')';}).join('; ')];});
        } else if(view==='year'){
          const weeksPerYear=38;
          expTitle='Personal Timetable – Academic Year';
          expSub=tsub+' · '+weekCount+' periods/week · '+weeksPerYear+' weeks';
          expH=['Metric','Value'];
          expR=[['Periods / week',weekCount],['Periods / year',weekCount*weeksPerYear],['Hours / year',Math.floor(weekMins*weeksPerYear/60)+'h'],['Subjects',Object.keys(bySubjectWk).length],['Classes',Object.keys(byClassWk).length],['— By Subject',''],
            ...subjectSummary.map(x=>[x.s.code+' · '+x.s.name,x.n*weeksPerYear+' periods']),
            ['— By Class',''],
            ...classSummary.map(x=>[x.name,x.n*weeksPerYear+' periods'])
          ];
        }
        return(<div>
          {/* Always-on counts */}
          <div className="grid-2" style={{gap:14,marginBottom:14}}>
            <div style={{padding:'12px 14px',border:'1px solid var(--line)',borderRadius:8,background:'var(--paper)'}}>
              <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--accent)',marginBottom:8}}>Subject-wise · per week</div>
              {subjectSummary.length?<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{subjectSummary.map(x=>(<span key={x.sId} className="chip" style={{background:x.s.color+'18',color:x.s.color}}><span className="chip-color" style={{background:x.s.color}}></span>{x.s.code}: {x.n}</span>))}</div>:<span style={{fontSize:12,color:'var(--ink-muted)',fontStyle:'italic'}}>No assignments yet.</span>}
            </div>
            <div style={{padding:'12px 14px',border:'1px solid var(--line)',borderRadius:8,background:'var(--paper)'}}>
              <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--warm)',marginBottom:8}}>Standard-wise · per week</div>
              {classSummary.length?<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{classSummary.map(x=>(<span key={x.cId} className="chip">{x.name}: {x.n}</span>))}</div>:<span style={{fontSize:12,color:'var(--ink-muted)',fontStyle:'italic'}}>No assignments yet.</span>}
            </div>
          </div>
          <div style={{marginBottom:14,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--ink-muted)',fontWeight:600}}>Export:</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>doExport('pdf',expTitle,expH,expR,expSub)}>PDF</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>doExport('word',expTitle,expH,expR,expSub)}>Word</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>doExport('excel',expTitle,expH,expR,expSub)}>Excel</button>
          </div>
          {view==='day'&&(()=>{
            const day=daysArr[dayIdx]||'Day';const sched=schedByDay[dayIdx]||[];
            return<div>
              <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:10}}><strong>{day}</strong> — {sched.length} period(s), {sched.reduce((s,sl)=>s+timeDiff(sl.start,sl.end),0)} min</div>
              {sched.length===0?<div style={{color:'var(--ink-muted)',fontStyle:'italic'}}>Free day.</div>:
              <table><thead><tr><th>Time</th><th>Period</th><th>Class</th><th>Subject</th></tr></thead><tbody>
                {sched.map((sl,i)=>{const subj=data.subjects.find(s=>s.id===sl.subjectId);return(<tr key={i}><td className="mono" style={{fontSize:12}}>{sl.start}–{sl.end}</td><td style={{fontSize:12}}>{sl.name}</td><td style={{fontSize:12,fontWeight:600}}>{sl.className}</td><td>{subj?<span className="chip" style={{background:subj.color+'22',color:subj.color}}><span className="chip-color" style={{background:subj.color}}></span>{subj.code} · {subj.name}</span>:'—'}</td></tr>);})}
              </tbody></table>}
            </div>;
          })()}
          {view==='week'&&(()=>{
            const allPeriodSets=data.classes.map(c=>getPeriodsForClass(data.school,c));
            const maxPeriods=Math.max(...allPeriodSets.map(p=>p.length),1);
            return<div style={{overflowX:'auto'}}>
              <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:10}}>Week total: <strong>{weekCount}</strong> periods · <strong>{weekMins}</strong> min ({Math.floor(weekMins/60)}h {weekMins%60}m)</div>
              <table><thead><tr><th>Period</th>{daysArr.map(d=><th key={d}>{d.slice(0,3)}</th>)}</tr></thead><tbody>
                {Array.from({length:maxPeriods}).map((_,pi)=>(<tr key={pi}><td className="mono" style={{fontSize:12,color:'var(--ink-muted)'}}>{pi+1}</td>
                  {daysArr.map((d,di)=>{const slot=(schedByDay[di]||[]).find(s=>s.periodIdx===pi);if(!slot)return<td key={di} style={{color:'var(--ink-muted)',fontSize:12}}>–</td>;const subj=data.subjects.find(s=>s.id===slot.subjectId);return<td key={di} style={{fontSize:12,background:subj?subj.color+'10':''}}><strong>{subj?subj.code:'?'}</strong><br/><span style={{fontSize:10,color:'var(--ink-muted)'}}>{slot.className}</span></td>;})}
                </tr>))}
              </tbody></table>
            </div>;
          })()}
          {view==='month'&&(()=>{
            const weeksInMonth=4;const monthCount=weekCount*weeksInMonth;const monthMins=weekMins*weeksInMonth;
            return<div>
              <div className="grid-3" style={{marginBottom:12}}>
                <div className="stat"><div className="label">Periods / week</div><div className="val">{weekCount}</div></div>
                <div className="stat"><div className="label">Periods / month</div><div className="val">{monthCount}</div><div className="delta">~ {weeksInMonth} weeks</div></div>
                <div className="stat"><div className="label">Hours / month</div><div className="val">{Math.floor(monthMins/60)}h {monthMins%60}m</div></div>
              </div>
              <div style={{fontSize:11,color:'var(--ink-muted)',marginTop:6,fontStyle:'italic'}}>Estimated from 4 teaching weeks per month. Actual monthly count varies with holidays.</div>
            </div>;
          })()}
          {view==='session'&&(()=>{
            const pr=SESSION_PRESETS[sessionPreview];
            if(!pr)return<div className="empty-state">Unknown session.</div>;
            const priP=buildSessionPeriods(pr.primary);const upP=buildSessionPeriods(pr.upper);const prP=buildSessionPeriods(pr.preprimary);
            const teachPri=priP.filter(p=>!isNonTeaching(p)).reduce((s,p)=>s+(p.duration||0),0);
            const teachUp=upP.filter(p=>!isNonTeaching(p)).reduce((s,p)=>s+(p.duration||0),0);
            const teachPre=prP.filter(p=>!isNonTeaching(p)).reduce((s,p)=>s+(p.duration||0),0);
            return<div>
              <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:12}}>Previewing how the periods are structured in <strong>{pr.label}</strong> ({pr.months}) — current assignments in the grid are kept. Period timings below reflect the session template.</div>
              <div className="grid-3" style={{marginBottom:14}}>
                <div className="stat"><div className="label">Primary teaching/day</div><div className="val">{teachPri}<span style={{fontSize:14}}> min</span></div></div>
                <div className="stat"><div className="label">Upper teaching/day</div><div className="val">{teachUp}<span style={{fontSize:14}}> min</span></div></div>
                <div className="stat"><div className="label">Pre-Pri teaching/day</div><div className="val">{teachPre}<span style={{fontSize:14}}> min</span></div></div>
              </div>
              <div style={{fontSize:11,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Weekly assignments for this teacher</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {daysArr.map((d,di)=>{const sc=schedByDay[di]||[];return<div key={d} style={{border:'1px solid var(--line)',borderRadius:6,padding:'8px 10px',minWidth:130}}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>{d.slice(0,3)} · {sc.length}</div>{sc.length?sc.map((sl,i)=>{const subj=data.subjects.find(s=>s.id===sl.subjectId);return<div key={i} style={{fontSize:11,color:'var(--ink-soft)'}}>{sl.start}–{sl.end} {subj?subj.code:'?'}</div>;}):<div style={{fontSize:11,color:'var(--ink-muted)',fontStyle:'italic'}}>free</div>}</div>;})}
              </div>
            </div>;
          })()}
          {view==='year'&&(()=>{
            const weeksPerYear=38;const yrPeriods=weekCount*weeksPerYear;const yrMins=weekMins*weeksPerYear;
            return<div>
              <div className="grid-4" style={{marginBottom:14}}>
                <div className="stat"><div className="label">Periods / year</div><div className="val">{yrPeriods}</div><div className="delta">~ {weeksPerYear} teaching weeks</div></div>
                <div className="stat"><div className="label">Hours / year</div><div className="val">{Math.floor(yrMins/60)}<span style={{fontSize:14}}> hrs</span></div></div>
                <div className="stat"><div className="label">Subjects</div><div className="val">{Object.keys(bySubjectWk).length}</div></div>
                <div className="stat"><div className="label">Classes</div><div className="val">{Object.keys(byClassWk).length}</div></div>
              </div>
              <div style={{fontSize:11,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>By Subject (yearly periods)</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>{subjectSummary.map(x=>(<span key={x.sId} className="chip" style={{background:x.s.color+'18',color:x.s.color}}><span className="chip-color" style={{background:x.s.color}}></span>{x.s.code}: {x.n*weeksPerYear}</span>))}</div>
              <div style={{fontSize:11,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>By Class (yearly periods)</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{classSummary.map(x=>(<span key={x.cId} className="chip">{x.name||'?'}: {x.n*weeksPerYear}</span>))}</div>
              <div style={{fontSize:11,color:'var(--ink-muted)',marginTop:10,fontStyle:'italic'}}>Academic-year estimate assumes {weeksPerYear} teaching weeks.</div>
            </div>;
          })()}
        </div>);
      })():<div style={{color:'var(--ink-muted)',fontStyle:'italic',padding:'12px 0'}}>Click a teacher row above, or pick one here to view their personal timetable.</div>}
    </div>
  </div>);
}
// Minute difference between two HH:MM values (used by Personal Timetable totals)
function timeDiff(a,b){if(!a||!b)return 0;const[ah,am]=a.split(':').map(Number);const[bh,bm]=b.split(':').map(Number);return Math.max(0,(bh*60+bm)-(ah*60+am));}

// ===== Proxy Management =====
function ProxyPage({data,update}){
  const[dayIdx,setDayIdx]=useState(0);const[absentIds,setAbsentIds]=useState([]);const[assignments,setAssignments]=useState({});
  const[dateStr,setDateStr]=useState('');const[dateErr,setDateErr]=useState('');
  const toggleAbsent=id=>setAbsentIds(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);

  // Date -> day-of-week mapping. Parse yyyy-mm-dd locally to avoid UTC drift.
  const WEEKDAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateFromStr=s=>{if(!s||!/^\d{4}-\d{2}-\d{2}$/.test(s))return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
  const onDateChange=s=>{
    setDateStr(s);setDateErr('');
    const dt=dateFromStr(s);if(!dt){return;}
    const wd=WEEKDAYS[dt.getDay()];
    const i=data.school.days.findIndex(d=>d===wd);
    if(i>=0){setDayIdx(i);}
    else{setDateErr(wd+' is not a working day. Schedule unchanged.');}
  };
  const prettyDate=()=>{const dt=dateFromStr(dateStr);if(!dt)return'';return dt.toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});};
  // Compact date label suitable for headers/print (e.g. "Wed, 22 Apr 2026")
  const compactDate=()=>{const dt=dateFromStr(dateStr);if(!dt)return new Date().toLocaleDateString('en-IN');return dt.toLocaleDateString('en-IN',{weekday:'short',year:'numeric',month:'short',day:'numeric'});};

  // Build absent teachers' schedules for the selected day
  const absentSchedules=useMemo(()=>{
    return absentIds.map(tId=>{const t=data.teachers.find(x=>x.id===tId);if(!t)return null;
      const sched=getTeacherScheduleForDay(tId,dayIdx,data.timetable,data.classes,data.school);
      return{teacher:t,schedule:sched};
    }).filter(Boolean);
  },[absentIds,dayIdx,data]);

  const assignProxy=(slotKey,proxyId)=>setAssignments(a=>({...a,[slotKey]:proxyId}));

  // Auto-suggest proxies: for each absent teacher's slot pick the best candidate
  // — free at that time, ideally teaches the same subject, lightest weekly load.
  const autoSuggest=()=>{
    if(!absentSchedules.length){alert('Mark absent teachers first.');return;}
    const weekLoad={};
    data.teachers.forEach(t=>{weekLoad[t.id]=teacherLoad(t,data.timetable,data.classes,data.school).total;});
    // Fold already-assigned proxy picks into weekLoad so repeated Suggest
    // clicks don't ignore teachers we just handed extra periods to.
    Object.values(assignments).forEach(pid=>{if(pid)weekLoad[pid]=(weekLoad[pid]||0)+1;});
    const next={...assignments};
    absentSchedules.forEach(({teacher:at,schedule})=>{
      schedule.forEach(sl=>{
        const slotKey=at.id+'|'+sl.start+'|'+sl.end+'|'+sl.classId+'|'+sl.subjectId;
        if(next[slotKey])return; // respect existing picks
        const free=findFreeTeachers(dayIdx,sl.start,sl.end,data.timetable,data.classes,data.school,data.teachers,absentIds);
        const sameSubj=free.filter(t=>(t.subjects||[]).includes(sl.subjectId));
        const pool=sameSubj.length?sameSubj:free;
        if(!pool.length)return;
        const picked=pool.slice().sort((a,b)=>(weekLoad[a.id]||0)-(weekLoad[b.id]||0))[0];
        if(picked){next[slotKey]=picked.id;weekLoad[picked.id]=(weekLoad[picked.id]||0)+1;}
      });
    });
    setAssignments(next);
  };
  const clearSuggestions=()=>{if(confirm('Clear all proxy assignments on this screen?'))setAssignments({});};

  // WhatsApp share — uses the wa.me deep link with a pre-filled text summary.
  const shareWhatsApp=()=>{
    const byProxy={};
    Object.entries(assignments).forEach(([key,proxyId])=>{if(!proxyId)return;
      const parts=key.split('|');const absent=data.teachers.find(t=>t.id===parts[0]);const proxy=data.teachers.find(t=>t.id===proxyId);
      const cls=data.classes.find(c=>c.id===parts[3]);const subj=data.subjects.find(s=>s.id===parts[4]);
      if(!proxy)return;if(!byProxy[proxyId])byProxy[proxyId]={teacher:proxy,slots:[]};
      byProxy[proxyId].slots.push({start:parts[1],end:parts[2],className:cls?cls.name:'?',subjectName:subj?subj.name:'?',absentName:absent?absent.name:'?'});
    });
    if(!Object.keys(byProxy).length){alert('No proxy assignments to share.');return;}
    const b=(typeof getBranding==='function')?getBranding():{name:'The World School, ICSE'};
    const dayName=data.school.days[dayIdx];const date=compactDate();
    let lines=['*'+b.name+' — Proxy Schedule*',dayName+' · '+date,''];
    Object.values(byProxy).forEach(({teacher:pr,slots})=>{
      lines.push('*'+pr.name+' ('+pr.code+')*');
      slots.sort((a,b)=>a.start.localeCompare(b.start)).forEach(s=>{
        lines.push('  • '+s.start+'–'+s.end+' · '+s.className+' · '+s.subjectName+' (for '+s.absentName+')');
      });
      lines.push('');
    });
    lines.push('— Timetable Studio '+(typeof APP_VERSION!=='undefined'?APP_VERSION:''));
    const url='https://wa.me/?text='+encodeURIComponent(lines.join('\n'));
    window.open(url,'_blank');
  };

  const printProxySlips=()=>{
    // Gather proxy assignments per proxy teacher
    const byProxy={};
    Object.entries(assignments).forEach(([key,proxyId])=>{if(!proxyId)return;
      const[absentId,pStart,pEnd,classId]=key.split('|');
      const absent=data.teachers.find(t=>t.id===absentId);const proxy=data.teachers.find(t=>t.id===proxyId);
      const cls=data.classes.find(c=>c.id===classId);const subj=data.subjects.find(s=>s.id===key.split('|')[4]);
      if(!proxy)return;if(!byProxy[proxyId])byProxy[proxyId]={teacher:proxy,slots:[]};
      byProxy[proxyId].slots.push({start:pStart,end:pEnd,className:cls?cls.name:'?',subjectName:subj?subj.name:'?',absentName:absent?absent.name:'?'});
    });
    // Open print window — use the picked calendar date if set, otherwise today's date
    const dayName=data.school.days[dayIdx];const date=compactDate();
    let html='<html><head><title>Proxy Slips</title><style>body{font-family:Arial,sans-serif;padding:20px}h2{margin:0 0 4px}table{width:100%;border-collapse:collapse;margin:8px 0 24px}th,td{border:1px solid #999;padding:8px;text-align:left;font-size:13px}th{background:#f0f0f0}.slip{page-break-after:always;padding:20px;border:2px solid #333;margin-bottom:24px;border-radius:8px}@media print{.slip{page-break-after:always}}</style></head><body>';
    html+='<div style="text-align:center;margin-bottom:20px"><h1>The World School, ICSE — Proxy Schedule</h1><p>'+dayName+' · '+date+'</p></div>';
    Object.values(byProxy).forEach(({teacher:pr,slots})=>{
      html+='<div class="slip"><h2>Proxy Slip for: '+pr.name+' ('+pr.code+')</h2><p style="color:#666;margin-bottom:8px">'+dayName+' · '+date+'</p><table><tr><th>Time</th><th>Class</th><th>Subject</th><th>Absent Teacher</th></tr>';
      slots.sort((a,b)=>a.start.localeCompare(b.start)).forEach(s=>{html+='<tr><td>'+s.start+'–'+s.end+'</td><td>'+s.className+'</td><td>'+s.subjectName+'</td><td>'+s.absentName+'</td></tr>';});
      html+='</table><div style="margin-top:24px;display:flex;justify-content:space-between"><div>Signature of Proxy Teacher: _______________</div><div>Coordinator: _______________</div></div></div>';
    });
    html+='</body></html>';
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };

  const printConsolidatedReport=()=>{
    const dayName=data.school.days[dayIdx];const date=compactDate();
    const allAssigned=Object.entries(assignments).filter(([k,v])=>v).map(([key,proxyId])=>{
      const parts=key.split('|');const absent=data.teachers.find(t=>t.id===parts[0]);const proxy=data.teachers.find(t=>t.id===proxyId);
      const cls=data.classes.find(c=>c.id===parts[3]);const subj=data.subjects.find(s=>s.id===parts[4]);
      return{proxyName:proxy?proxy.name:'?',proxyCode:proxy?proxy.code:'?',start:parts[1],end:parts[2],className:cls?cls.name:'?',subjectName:subj?subj.name:'?',absentName:absent?absent.name:'?'};
    }).sort((a,b)=>a.start.localeCompare(b.start));
    let html='<html><head><title>Consolidated Proxy Report</title><style>body{font-family:Arial,sans-serif;padding:24px}table{width:100%;border-collapse:collapse;margin:12px 0}th,td{border:1px solid #999;padding:8px 10px;text-align:left;font-size:13px}th{background:#f0f0f0}.note{margin-top:24px;padding:12px;background:#fffde7;border:1px solid #fdd835;border-radius:6px;font-size:12px;color:#5d4037}</style></head><body>';
    html+='<div style="text-align:center;margin-bottom:16px"><h1 style="margin:0">The World School, ICSE – Bhusawal</h1><h2 style="margin:4px 0;font-weight:400">Consolidated Proxy Report</h2><p style="color:#666">'+dayName+' · '+date+'</p></div>';
    html+='<table><thead><tr><th>Sr.</th><th>Proxy Teacher</th><th>Period</th><th>Class</th><th>Subject</th><th>Absent Teacher</th><th>Signature</th></tr></thead><tbody>';
    allAssigned.forEach((a,i)=>{html+='<tr><td>'+(i+1)+'</td><td>'+a.proxyName+' ('+a.proxyCode+')</td><td>'+a.start+'–'+a.end+'</td><td>'+a.className+'</td><td>'+a.subjectName+'</td><td>'+a.absentName+'</td><td style="min-width:100px"></td></tr>';});
    html+='</tbody></table>';
    html+='<div class="note"><strong>Note:</strong> A scanned copy of this report is to be shared with the HR over mail by the Supervisor.</div>';
    html+='<div style="margin-top:32px;display:flex;justify-content:space-between"><div>Prepared by: _______________<br/><small>Supervisor</small></div><div>Received by: _______________<br/><small>HR</small></div><div>Date: '+date+'</div></div>';
    html+='</body></html>';
    const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
  };

  const dayOpts=data.school.days.map((d,i)=>({value:String(i),label:d}));
  const teacherOpts=data.teachers.map(t=>({value:t.id,label:t.code+' – '+t.name}));

  return(<div>
    <div className="pagehead"><div><h1 className="serif">Proxy <em>Management</em></h1><div className="sub">Mark absent teachers, view their schedule, assign free substitutes, and print reports.</div></div>
      <div className="actions" style={{flexWrap:'wrap'}}>
        {absentIds.length>0&&<button className="btn btn-ghost" onClick={autoSuggest} title="Pick the lightest-load free teacher for each empty slot">Suggest proxies</button>}
        {Object.keys(assignments).filter(k=>assignments[k]).length>0&&<>
          <button className="btn btn-ghost" onClick={clearSuggestions}>Clear</button>
          <button className="btn btn-ghost" onClick={shareWhatsApp} title="Share a text summary on WhatsApp">WhatsApp Share</button>
          <button className="btn btn-ghost" onClick={printConsolidatedReport}>Consolidated Report</button>
          <button className="btn btn-primary" onClick={printProxySlips}>Print Proxy Slips</button>
        </>}
      </div>
    </div>

    <div className="card">
      <div className="grid-3">
        <div className="field"><label>Date (optional)</label><input type="date" value={dateStr} onChange={e=>onDateChange(e.target.value)} style={{padding:'9px 12px',border:'1px solid var(--line)',borderRadius:6,background:'var(--paper)',width:'100%'}}/>
          {dateStr&&!dateErr&&<div style={{fontSize:11,color:'var(--ink-muted)',marginTop:4}}>{prettyDate()}</div>}
          {dateErr&&<div style={{fontSize:11,color:'var(--danger)',marginTop:4}}>{dateErr}</div>}
        </div>
        <div className="field"><label>Day</label><SearchSelect value={String(dayIdx)} options={dayOpts} onChange={v=>{setDayIdx(Number(v));}}/></div>
        <div className="field"><label>Add Absent Teacher</label>
          <SearchSelect value="" options={[{value:'',label:'-- Select teacher --'},...data.teachers.filter(t=>!absentIds.includes(t.id)).map(t=>({value:t.id,label:t.code+' – '+t.name}))]} onChange={v=>{if(v)setAbsentIds(a=>[...a,v])}} placeholder="Search by name or code..."/>
        </div>
      </div>
      {absentIds.length>0&&(<div style={{marginTop:12}}>
        <label style={{display:'block',fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink-muted)',fontWeight:500,marginBottom:6}}>Absent Today ({absentIds.length})</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {absentIds.map(id=>{const t=data.teachers.find(x=>x.id===id);return t?(<button key={id} onClick={()=>toggleAbsent(id)} className="btn btn-sm" style={{background:'var(--danger)',color:'white',borderColor:'var(--danger)'}}>{t.code} – {t.name} ×</button>):null;})}
        </div>
      </div>)}
    </div>

    {absentSchedules.length===0?(<div className="card"><div className="empty-state"><h3 className="serif">Select absent teachers above</h3><p>Their schedule for {data.school.days[dayIdx]} will appear here with proxy assignment dropdowns.</p></div></div>):(
      absentSchedules.map(({teacher:at,schedule})=>(
        <div className="card" key={at.id}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
            <div className="avatar" style={{background:'var(--danger-soft)',color:'var(--danger)'}}>{at.photo?<img src={at.photo} alt=""/>:at.code.slice(0,2)}</div>
            <div><div style={{fontWeight:600,fontSize:15}}>{at.name} <span className="mono" style={{color:'var(--ink-muted)',fontSize:12}}>{at.code}</span></div><div style={{fontSize:12,color:'var(--danger)'}}>Absent — {data.school.days[dayIdx]}</div></div>
          </div>
          {schedule.length===0?<div style={{color:'var(--ink-muted)',fontStyle:'italic',padding:'12px 0'}}>No classes scheduled for this day.</div>:(
            <table><thead><tr><th>Period</th><th>Time</th><th>Class</th><th>Subject</th><th>Assign Proxy</th></tr></thead><tbody>
              {schedule.map((sl,i)=>{
                const subj=data.subjects.find(s=>s.id===sl.subjectId);
                const slotKey=`${at.id}|${sl.start}|${sl.end}|${sl.classId}|${sl.subjectId}`;
                const freeTeachers=findFreeTeachers(dayIdx,sl.start,sl.end,data.timetable,data.classes,data.school,data.teachers,absentIds);
                const freeOpts=[{value:'',label:'-- Select Proxy --'},...freeTeachers.map(t=>({value:t.id,label:t.code+' – '+t.name}))];
                const assigned=assignments[slotKey];
                return(<tr key={i}><td style={{fontWeight:600}}>{sl.name}</td><td className="mono">{sl.start}–{sl.end}</td><td>{sl.className}</td><td>{subj?<span className="chip" style={{background:subj.color+'22',color:subj.color}}><span className="chip-color" style={{background:subj.color}}></span>{subj.code}</span>:'--'}</td>
                  <td><SearchSelect value={assigned||''} options={freeOpts} onChange={v=>assignProxy(slotKey,v)} placeholder="Select proxy..."/></td></tr>);
              })}
            </tbody></table>
          )}
        </div>
      ))
    )}

    {Object.keys(assignments).filter(k=>assignments[k]).length>0&&(
      <div className="card"><div className="card-title">Proxy Summary</div>
        <table><thead><tr><th>Proxy Teacher</th><th>Period</th><th>Class</th><th>For (Absent)</th></tr></thead><tbody>
          {Object.entries(assignments).filter(([k,v])=>v).map(([key,proxyId])=>{
            const parts=key.split('|');const absent=data.teachers.find(t=>t.id===parts[0]);const proxy=data.teachers.find(t=>t.id===proxyId);
            const cls=data.classes.find(c=>c.id===parts[3]);
            return<tr key={key}><td style={{fontWeight:600}}>{proxy?proxy.name:'?'}</td><td className="mono">{parts[1]}–{parts[2]}</td><td>{cls?cls.name:'?'}</td><td>{absent?absent.name:'?'}</td></tr>;
          })}
        </tbody></table>
      </div>
    )}
  </div>);
}

// ===== Rules & Limitations =====
function RulesPage({data}){
  const Principal=(data.teachers||[]).find(t=>t.designation==='Principal');
  const nonPrincipals=(data.teachers||[]).filter(t=>t.designation!=='Principal');
  const maxValues=[...new Set(nonPrincipals.map(t=>t.maxPeriods))].sort((a,b)=>a-b);
  const Rule=({n,title,children})=>(
    <div style={{display:'flex',gap:14,padding:'18px 0',borderBottom:'1px solid var(--line-soft)'}}>
      <div style={{flex:'0 0 40px',fontFamily:"'Instrument Serif',serif",fontSize:28,lineHeight:1,color:'var(--accent)'}}>{n}</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{title}</div>
        <div style={{fontSize:13,color:'var(--ink-soft)',lineHeight:1.6}}>{children}</div>
      </div>
    </div>
  );
  return(<div>
    <div className="pagehead"><div><h1 className="serif">Allocation <em>Rules</em></h1><div className="sub">Exactly what Timetable Studio enforces when you click Auto-fill, plus the limits the live timetable watches for.</div></div></div>
    <div className="card">
      <div className="card-title">Subject placement rules (auto-fill)</div>
      <Rule n="01" title="Allocations drive the pool">Only subjects that appear in the <strong>Allocations</strong> tab for a class are eligible to be placed in that class's timetable. If a subject has no allocated teacher, the solver still places the subject in an empty slot but flags the cell as <em>unallocated</em>.</Rule>
      <Rule n="02" title="Balanced subject quota">Each subject's weekly count is <code>floor(totalTeachingSlots / numSubjects)</code>. Any remainder is distributed one-per-subject from the top of the allocation list so no subject sits idle.</Rule>
      <Rule n="03" title="No teacher double-booking">Before placing a cell, the solver checks every other class's timetable at the exact same day + start + end. If the teacher is already teaching elsewhere, that subject is skipped for the slot.</Rule>
      <Rule n="04" title="Teacher max periods per week">The hard ceiling is <strong>{nonPrincipals.length?maxValues.join(' / '):42}</strong> periods for non-principal staff and {Principal?Principal.maxPeriods:10} for the Principal. Auto-fill stops placing a teacher once this cap is reached for the week, across every class.</Rule>
      <Rule n="05" title="First period of each day">Priority order: (a) the class's <strong>Default First Subject</strong> from the Classes tab, (b) a subject taught by the <strong>Class Teacher</strong>, (c) the next available item from the shuffled pool. The Default First Subject is filtered by the class teacher's qualified subjects.</Rule>
      <Rule n="06" title="Lecture-based availability window">Teachers with <code>teacherType = 'lecture_based'</code> and an <code>availFrom / availTo</code> window are only considered for slots that fit inside that window — useful for visiting or part-time faculty.</Rule>
      <Rule n="07" title="Fallback placement">If no eligible teacher is free for a slot, the solver still places the subject in that slot but leaves <code>teacherId</code> null. After the run it alerts how many slots were placed without a teacher so you can fix them manually.</Rule>
    </div>
    <div className="card">
      <div className="card-title">Live conflict checks (Timetable Builder)</div>
      <Rule n="08" title="Teacher clash (red dot)">Two classes assigning the same teacher to overlapping time ranges on the same day get flagged with a red dot. Auto-fill prevents this; it can still appear from manual edits.</Rule>
      <Rule n="09" title="Room clash (yellow dot)">Two classes assigning the same room to overlapping time ranges on the same day get a yellow dot. Same detection logic as teacher clashes.</Rule>
      <Rule n="10" title="Day-structure validation">The Day Structure editor warns on rows where <code>start ≥ end</code> or where two periods overlap. Save these at your own risk — downstream conflict detection relies on clean period times.</Rule>
    </div>
    <div className="card">
      <div className="card-title">Limits & capacities (live data)</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12}}>
        <div className="stat"><div className="label">Non-principal max/wk</div><div className="val">{nonPrincipals.length?maxValues.slice(-1)[0]:42}</div><div className="delta">periods per teacher per week</div></div>
        <div className="stat"><div className="label">Principal max/wk</div><div className="val">{Principal?Principal.maxPeriods:'—'}</div><div className="delta">periods per week</div></div>
        <div className="stat"><div className="label">Working days</div><div className="val">{data.school.days.length}</div><div className="delta">{data.school.days.join(', ')}</div></div>
        <div className="stat"><div className="label">Teachers</div><div className="val">{(data.teachers||[]).length}</div><div className="delta">{nonPrincipals.length} non-principal + 1 principal</div></div>
      </div>
    </div>
    <div className="card" style={{background:'var(--bg)'}}>
      <div className="card-title">What the tool does NOT enforce</div>
      <ul style={{paddingLeft:20,fontSize:13,color:'var(--ink-soft)',lineHeight:1.8}}>
        <li>Hard caps on repeated subjects per day (you can stack the same subject back-to-back if the allocation allows).</li>
        <li>Lab / paired-period blocks — double-period labs must be arranged manually.</li>
        <li>Teacher personal preferences (e.g. "no periods on Wednesday morning") unless modeled via the lecture-based availability window.</li>
        <li>Break-time supervision duty rosters — proxy slips cover absence only.</li>
      </ul>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
