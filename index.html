<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The World School — Timetable Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{--bg:#f6f3ec;--paper:#fbf9f3;--ink:#1a1f1c;--ink-soft:#4a544d;--ink-muted:#8a8f88;--line:#e3ddcf;--line-soft:#ebe6da;--accent:#0d4f3c;--accent-soft:#1a6b54;--mint:#9fd5c3;--warm:#b8651f;--warm-soft:#d97a26;--danger:#9a2a2a;--danger-soft:#fde2e2}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Geist',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-height:100vh}
  .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}
  .mono{font-family:'Geist Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:inherit;color:var(--ink)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-muted)}

  .app{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--paper);border-right:1px solid var(--line);padding:28px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:width .2s ease}
  .sidebar.collapsed{width:64px}
  .sidebar.collapsed .brand,.sidebar.collapsed .footer-note{display:none}
  .sidebar.collapsed .nav{padding:20px 8px}
  .sidebar.collapsed .nav-item{justify-content:center;padding:10px 0}
  .sidebar.collapsed .nav-item span:not(.num){display:none}
  .sidebar-toggle{width:28px;height:28px;border:1px solid var(--line);border-radius:6px;background:var(--paper);display:flex;align-items:center;justify-content:center;color:var(--ink-muted);cursor:pointer;font-size:13px;margin:0 14px 10px;align-self:flex-end;transition:all .15s}
  .sidebar-toggle:hover{background:var(--bg);color:var(--ink);border-color:var(--ink-muted)}
  .sidebar.collapsed .sidebar-toggle{align-self:center;margin:0 0 10px}
  .brand{padding:0 28px 24px;border-bottom:1px solid var(--line)}
  .brand .mark{font-size:11px;letter-spacing:0.18em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px}
  .brand .name{font-size:24px;line-height:1.1;color:var(--ink)}
  .brand .name em{font-style:italic;color:var(--accent)}
  .nav{padding:20px 14px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:6px;color:var(--ink-soft);font-size:13.5px;font-weight:500;width:100%;text-align:left;transition:all .15s;margin-bottom:2px}
  .nav-item:hover{background:var(--line-soft);color:var(--ink)}
  .nav-item.active{background:var(--ink);color:var(--paper)}
  .nav-item .num{font-size:11px;color:var(--ink-muted);font-family:'Geist Mono',monospace;width:18px}
  .nav-item.active .num{color:var(--paper);opacity:.6}
  .footer-note{padding:16px 28px;font-size:11px;color:var(--ink-muted);border-top:1px solid var(--line);line-height:1.6}

  .main{flex:1;padding:36px 48px 80px;max-width:calc(100vw - 240px);overflow-x:hidden;transition:max-width .2s ease}
  .main.sidebar-collapsed{max-width:calc(100vw - 64px)}
  .pagehead{margin-bottom:32px;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .pagehead h1{font-size:42px;line-height:1.05;color:var(--ink);margin-bottom:6px}
  .pagehead .sub{color:var(--ink-soft);font-size:14px;max-width:560px}
  .pagehead .actions{display:flex;gap:8px}

  .btn{padding:9px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-primary:hover{background:var(--accent)}
  .btn-ghost{border-color:var(--line);color:var(--ink-soft);background:var(--paper)}
  .btn-ghost:hover{border-color:var(--ink-muted);color:var(--ink)}
  .btn-success{background:#065f46;color:var(--paper)}
  .btn-success:hover{background:#047857}
  .btn-danger{color:var(--danger);background:transparent}
  .btn-danger:hover{background:var(--danger-soft)}
  .btn-sm{padding:6px 11px;font-size:12px}
  .btn-icon{width:28px;height:28px;padding:0;justify-content:center;border-radius:5px;color:var(--ink-muted)}
  .btn-icon:hover{background:var(--line-soft);color:var(--ink)}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:24px;margin-bottom:20px}
  .card-title{font-size:11px;letter-spacing:0.16em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:14px;font-weight:500}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:6px;background:var(--paper);transition:border .15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:12px;align-items:flex-end}
  .row .field{flex:1;margin-bottom:0}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--paper)}
  td{padding:12px 14px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(13,79,60,0.025)}

  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:14px;font-size:11.5px;font-weight:500;background:var(--line-soft);color:var(--ink-soft)}
  .chip-color{width:9px;height:9px;border-radius:50%}
  .badge{display:inline-block;padding:2px 8px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border-radius:4px;background:var(--line-soft);color:var(--ink-soft)}
  .badge-warn{background:#fef3c7;color:#92400e}
  .badge-ok{background:#d1fae5;color:#065f46}
  .badge-err{background:var(--danger-soft);color:var(--danger)}

  .tt-toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .tt-toolbar select{padding:8px 12px;border:1px solid var(--line);border-radius:6px;background:var(--paper);font-weight:500;min-width:180px}
  .tt-grid{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper)}
  .tt-row{display:grid;grid-template-columns:90px repeat(var(--cols),1fr);border-bottom:1px solid var(--line-soft)}
  .tt-row:last-child{border-bottom:none}
  .tt-cell{padding:10px;border-right:1px solid var(--line-soft);min-height:64px;display:flex;flex-direction:column;justify-content:center;font-size:12.5px;position:relative;cursor:pointer;transition:background .12s}
  .tt-cell:last-child{border-right:none}
  .tt-cell:hover{background:rgba(13,79,60,0.04)}
  .tt-cell.header{background:var(--bg);font-weight:500;color:var(--ink-soft);font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:default;text-align:center;padding:14px 8px}
  .tt-cell.time{background:var(--bg);color:var(--ink-muted);font-family:'Geist Mono',monospace;font-size:10.5px;cursor:default;text-align:center;padding:8px 4px;line-height:1.3}
  .tt-cell.break{background:repeating-linear-gradient(45deg,var(--line-soft),var(--line-soft) 6px,transparent 6px,transparent 12px);color:var(--ink-muted);font-style:italic;cursor:default;text-align:center;justify-content:center;align-items:center}
  .tt-cell.assembly{background:rgba(13,79,60,0.08);color:var(--accent);font-weight:500;cursor:default;text-align:center;justify-content:center;align-items:center;font-size:11.5px}
  .tt-cell.orientation{background:rgba(184,101,31,0.08);color:var(--warm);font-weight:500;cursor:default;text-align:center;justify-content:center;align-items:center;font-size:11.5px}
  .tt-cell .subj{font-weight:600;font-size:12.5px;line-height:1.2;margin-bottom:2px;display:flex;align-items:center;gap:6px}
  .tt-cell .teach{font-size:11px;color:var(--ink-muted)}
  .tt-cell.empty{color:var(--ink-muted);font-style:italic;font-size:11.5px;text-align:center;justify-content:center;align-items:center}
  .tt-cell.conflict{background:var(--danger-soft) !important}
  .tt-cell.conflict::before{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--danger);border-radius:50%}
  .tt-cell.room-conflict{background:#fef3c7 !important}
  .tt-cell.room-conflict::before{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;background:#92400e;border-radius:50%}

  .modal-bg{position:fixed;inset:0;background:rgba(26,31,28,0.4);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--paper);border-radius:12px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .modal-head{padding:22px 24px;border-bottom:1px solid var(--line)}
  .modal-head h3{font-size:22px;line-height:1.2}
  .modal-body{padding:20px 24px;overflow-y:auto}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}

  .stat{padding:18px 20px;background:var(--paper);border:1px solid var(--line);border-radius:10px}
  .stat .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:8px}
  .stat .val{font-size:32px;font-family:'Instrument Serif',serif;line-height:1;color:var(--ink)}
  .stat .delta{font-size:12px;color:var(--ink-soft);margin-top:6px}

  .load-bar{height:6px;background:var(--line-soft);border-radius:3px;overflow:hidden;margin-top:6px}
  .load-fill{height:100%;background:var(--accent);transition:width .3s}
  .load-fill.warn{background:var(--warm)}
  .load-fill.full{background:var(--accent-soft)}
  .load-fill.over{background:var(--danger)}

  .heat{display:grid;grid-template-columns:80px repeat(var(--periods),1fr);gap:2px;font-size:10px}
  .heat-cell{padding:6px 4px;text-align:center;border-radius:3px;background:var(--line-soft);min-height:24px;display:flex;align-items:center;justify-content:center}
  .heat-cell.lvl1{background:#dde7e1}.heat-cell.lvl2{background:#a4c8b9}.heat-cell.lvl3{background:#5ea08a}.heat-cell.lvl4{background:var(--accent);color:var(--paper)}
  .heat-cell.label{background:transparent;justify-content:flex-start;color:var(--ink-soft);font-weight:500}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-muted)}
  .empty-state h3{font-size:24px;color:var(--ink-soft);margin-bottom:8px}
  .empty-state p{margin-bottom:16px}

  .tab-bar{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:fit-content}
  .tab-btn{padding:10px 24px;font-size:13px;font-weight:500;background:var(--paper);color:var(--ink-soft);border:none;cursor:pointer;border-right:1px solid var(--line);transition:all .15s}
  .tab-btn:last-child{border-right:none}
  .tab-btn:hover{background:var(--bg)}
  .tab-btn.active{background:var(--ink);color:var(--paper)}

  /* Searchable Select */
  .ss-wrap{position:relative}
  .ss-trigger{width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:6px;background:var(--paper);cursor:pointer;font-size:13px;text-align:left;display:flex;justify-content:space-between;align-items:center;min-height:38px}
  .ss-trigger:hover{border-color:var(--ink-muted)}
  .ss-trigger .ss-arrow{font-size:10px;color:var(--ink-muted)}
  .ss-drop{position:absolute;top:100%;left:0;right:0;background:var(--paper);border:1px solid var(--line);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:40;margin-top:4px;overflow:hidden}
  .ss-search{width:100%;padding:10px 12px;border:none;border-bottom:1px solid var(--line);font-size:13px;outline:none}
  .ss-list{max-height:180px;overflow-y:auto}
  .ss-opt{padding:8px 12px;cursor:pointer;font-size:13px;transition:background .1s}
  .ss-opt:hover{background:var(--line-soft)}
  .ss-opt.selected{background:var(--accent);color:var(--paper)}

  /* Avatar */
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--line-soft);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--ink-muted);overflow:hidden;flex-shrink:0}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar-lg{width:72px;height:72px;font-size:22px;cursor:pointer;border:2px dashed var(--line);transition:border-color .15s}
  .avatar-lg:hover{border-color:var(--accent)}

  /* Proxy */
  .proxy-cell{padding:8px 10px;border:1px solid var(--line-soft);border-radius:6px;background:var(--paper);min-height:48px}
  .proxy-cell.assigned{border-color:var(--accent);background:rgba(13,79,60,0.04)}
  .proxy-slip{background:white;padding:32px;border:1px solid var(--line);border-radius:10px;margin-top:16px}

  @media (max-width:900px){
    .sidebar{width:64px}
    .brand,.footer-note,.nav-item span:not(.num){display:none}
    .nav{padding:20px 8px}
    .nav-item{justify-content:center}
    .main{padding:24px;max-width:calc(100vw - 64px)}
    .pagehead h1{font-size:30px}
    .grid-3,.grid-4{grid-template-columns:1fr 1fr}
  }
  @media print{
    body{background:white}
    .sidebar,.pagehead .actions,.tt-toolbar,.no-print{display:none !important}
    .main{padding:0;max-width:100%}
    .card{border:1px solid #ccc;page-break-inside:avoid}
  }
</style>
</head>

// Duration helper: given a startTime and array of periods with duration, compute start/end
function calcTimes(startTime, periods){
  let mins = parseInt(startTime.split(':')[0])*60 + parseInt(startTime.split(':')[1]);
  return periods.map(p=>{
    const dur = p.duration || 30;
    const s = String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0');
    mins += dur;
    const e = String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0');
    return {...p, start:s, end:e};
  });
}

function migrateTeachers(teachers, qualMaster){
  if(!teachers) return teachers;
  const profList=['B.Ed.','M.Ed.','D.El.Ed.','D.Ed.','B.P.Ed.','M.P.Ed.','B.Lib.Sc.','M.Lib.Sc.','N.T.T.','E.C.C.Ed.','CTET','MH-TET'];
  const qm = qualMaster || DEFAULT_QUAL_MASTER;
  return teachers.map(t=>{
    const b={qualifications:[],otherCourses:'',designation:'Asst. Teacher',status:'OLD',photo:'',assignedClasses:[],...t};
    // Migrate old single 'degree' field
    if(t.degree!==undefined&&!t.degreeQual&&!t.profCourse&&!t.qualifications){
      if(t.degree){
        const match=qm.find(q=>q.name===t.degree);
        if(match) b.qualifications=[match.id];
      }
    }
    delete b.degree;
    // Migrate old degreeQual/profCourse arrays to unified qualifications
    if((t.degreeQual&&t.degreeQual.length)||(t.profCourse&&t.profCourse.length)){
      if(!t.qualifications||!t.qualifications.length){
        const names=[...(t.degreeQual||[]),...(t.profCourse||[])];
        b.qualifications=names.map(n=>{const m=qm.find(q=>q.name===n);return m?m.id:null;}).filter(Boolean);
      }
    }
    delete b.degreeQual; delete b.profCourse;
    if(typeof b.qualifications==='undefined') b.qualifications=[];
    if(!b.assignedClasses) b.assignedClasses=[];
    return b;
  });
}

function migrateData(old){
  if(old.classes) old.classes=old.classes.map(c=>{
    const base=c.group?c:{...c,group:c.name.match(/^[1-4]/)?'primary':c.name.match(/nursery|jr|sr|kg/i)?'preprimary':'upper'};
    if(base.grade===undefined){const m=base.name.match(/^(\d+)/);base.grade=m?parseInt(m[1]):0;}
    return base;
  });
  if(old.school&&old.school.periods&&!old.school.primaryPeriods){old.school.primaryPeriods=old.school.periods;old.school.upperPeriods=old.school.periods;}
  if(old.school&&!old.school.activeSession) old.school.activeSession='normal';
  if(old.school&&!old.school.preprimaryPeriods) old.school.preprimaryPeriods=buildSessionPeriods(SESSION_PRESETS.normal.preprimary);
  // Day categories: weekdays / activity days / bag-less day. Split existing school.days
  // into the standard pattern (Mon/Tue/Thu/Fri = weekdays, Wed/Sat = activity).
  if(old.school){
    if(!old.school.dayCategories){
      const d=old.school.days||['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      old.school.dayCategories={
        weekdays:d.filter(x=>['Monday','Tuesday','Thursday','Friday'].includes(x)),
        activity:d.filter(x=>['Wednesday','Saturday'].includes(x)),
        bagless:[]
      };
    }
    if(!old.school.baglessRule) old.school.baglessRule='lastOfMonth';
    // Per-category period grids — clone the currently-saved arrays as the starting point.
    if(!old.school.categoryPeriods){
      const mk=()=>({
        preprimaryStart:old.school.preprimaryStart||'08:30',
        primaryStart:old.school.primaryStart||'08:00',
        upperStart:old.school.upperStart||'08:15',
        preprimaryPeriods:(old.school.preprimaryPeriods||buildSessionPeriods(SESSION_PRESETS.normal.preprimary)).map(p=>({...p})),
        primaryPeriods:(old.school.primaryPeriods||buildSessionPeriods(SESSION_PRESETS.normal.primary)).map(p=>({...p})),
        upperPeriods:(old.school.upperPeriods||buildSessionPeriods(SESSION_PRESETS.normal.upper)).map(p=>({...p}))
      });
      old.school.categoryPeriods={weekdays:mk(),activity:mk(),bagless:mk()};
    }
  }
  if(!old.qualMaster) old.qualMaster=DEFAULT_QUAL_MASTER.map(q=>({...q}));
  if(!old.rooms) old.rooms=[{id:'r1',name:'Classroom 1'},{id:'r2',name:'Classroom 2'},{id:'r3',name:'Computer Lab'},{id:'r4',name:'Library'},{id:'r5',name:'Playground'}];
  if(old.teachers) old.teachers=migrateTeachers(old.teachers, old.qualMaster);
  // One-time bump: cap all non-principals at 42 periods/week. Runs once per install
  // (_v42caps flag) so manually-lowered values aren't clobbered on later loads.
  if(!old._v42caps&&old.teachers){
    old.teachers=old.teachers.map(t=>{
      if(t.designation==='Principal') return t;
      if(!t.maxPeriods||t.maxPeriods<42) return{...t,maxPeriods:42};
      return t;
    });
    old._v42caps=true;
  }
  if(old.teachers) old.teachers=old.teachers.map(t=>({teacherType:'regular',availFrom:'',availTo:'',...t}));
  if(!old.proxyAssignments) old.proxyAssignments={};
  if(!old.lectureLimits) old.lectureLimits=LECTURE_LIMITS;
  // Migrate subjects: add subGroup and standards if missing
  if(old.subjects) old.subjects=old.subjects.map(s=>{
    if(s.subGroup) return s;
    const def=ICSE_SUBJECTS.find(d=>d.id===s.id||d.code===s.code);
    return {...s, subGroup:def?def.subGroup:'regular', standards:def?def.standards:[]};
  });
  return old;
}

async function sha256Hex(txt){
  try{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){return 'plain:'+txt;}
}
// Pull the cloud row. Returns {data, updatedAt, updatedBy, passcodeHash} or null.
async function cloudPullRow(){

  if(error)throw new Error(error.message||'Pull failed.');
  if(!data)return null;
  return{data:data.data,updatedAt:data.updated_at?new Date(data.updated_at).getTime():0,updatedBy:data.updated_by||'',passcodeHash:data.passcode_hash||''};

async function cloudPushRow({data,passcodeHash,updatedBy}){

  const{error}=await sb.from(SYNC_TABLE).upsert(row).select();
  if(error)throw new Error(error.message||'Push failed.');

// Insert a timestamped snapshot into tws_backups. Called after each successful
// Push; bails out silently if the most recent backup was <12h ago.
async function cloudInsertBackup({data,updatedBy}){
  const sb=getSupabase();if(!sb)return{skipped:'no client'};
  try{
    const{data:latest}=await sb.from(BACKUPS_TABLE).select('created_at').eq('workspace_id',SYNC_ROW_ID).order('created_at',{ascending:false}).limit(1);
    if(latest&&latest[0]&&new Date(latest[0].created_at).getTime()>Date.now()-BACKUP_MIN_GAP_MS)return{skipped:'recent'};
    const{error}=await sb.from(BACKUPS_TABLE).insert({workspace_id:SYNC_ROW_ID,data,created_by:updatedBy||'anonymous'});
    if(error)return{error:error.message};
    return{ok:true};
  }catch(e){return{error:String(e&&e.message||e)};}
}

  const{data,error}=await sb.from(BACKUPS_TABLE).select('id,workspace_id,created_at,created_by').eq('workspace_id',SYNC_ROW_ID).order('created_at',{ascending:false}).limit(limit||20);
  if(error)throw new Error(error.message||'List failed.');
  return data||[];
}
async function cloudFetchBackup(id){
  const sb=getSupabase();if(!sb)throw new Error('Supabase client not loaded.');
  const{data,error}=await sb.from(BACKUPS_TABLE).select('data,created_at,created_by').eq('id',id).maybeSingle();
  if(error)throw new Error(error.message||'Fetch failed.');
  return data;
}
// Subscribe to remote changes on the shared row. Returns an unsubscribe fn.
function cloudSubscribeRow(cb){
  const sb=getSupabase();if(!sb)return()=>{};
  const channel=sb.channel('tws-timetables-row').on('postgres_changes',{event:'*',schema:'public',table:SYNC_TABLE,filter:'id=eq.'+SYNC_ROW_ID},payload=>{try{cb(payload&&payload.new);}catch(e){}}).subscribe();
  return()=>{try{sb.removeChannel(channel);}catch(e){}};
}

// ====== Save/Export/Import ======
// DDMMYY_HHMM — compact timestamp suitable for filenames (e.g. 200426_1845).
function fmtTimestamp(d){const x=d||new Date();const p=n=>String(n).padStart(2,'0');return p(x.getDate())+p(x.getMonth()+1)+String(x.getFullYear()).slice(-2)+'_'+p(x.getHours())+p(x.getMinutes());}
function exportJSON(data,opts){
  const defaultName='TWS_'+fmtTimestamp();
  const n=(opts&&opts.silent)?defaultName:prompt('Save data as:',defaultName);
  if(!n)return;
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;
  a.download=n.endsWith('.json')?n:n+'.json';a.click();URL.revokeObjectURL(u);
}
// Classes — normalize by a sortable key so Nursery → LKG → UKG → 1 → 2 … → 10
// even when rows are added later. Grade > 0 rows come after pre-primary tokens.
function classSortKey(c){
  if(!c)return 999;
  const grade=(c.grade==null?parseInt(((c.name||'').match(/^(\d+)/)||[])[1]||'0'):c.grade)||0;
  if(grade>0)return grade+10; // 1..10 -> 11..20
  const n=(c.name||'').toLowerCase();
  if(/\bnursery\b|^nur/.test(n))return 1;
  if(/\bjr\.?\s*kg\b|^jkg\b|\blkg\b/.test(n))return 2;
  if(/\bsr\.?\s*kg\b|^skg\b|\bukg\b/.test(n))return 3;
  if(c.group==='preprimary')return 4;
  return 10;
}
function sortClasses(arr){return[...(arr||[])].sort((a,b)=>{const d=classSortKey(a)-classSortKey(b);return d!==0?d:(a.name||'').localeCompare(b.name||'');});}
function saveAsHTMLFile(data){const n=prompt('Save timetable file as:','TWS_Timetable_Studio_'+new Date().toISOString().slice(0,10));if(!n)return;const h=document.documentElement.outerHTML.replace(/<script id="tws-embedded-data">[\s\S]*?<\/script>\s*/g,'');const ds='<script id="tws-embedded-data">window.__TWS_EMBEDDED_DATA='+JSON.stringify(data)+';<\/script>';const f=h.replace('</body>',ds+'\n</body>');const b=new Blob(['<!DOCTYPE html>\n<html>'+f.replace(/^<html[^>]*>/,'')],{type:'text/html'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=(n.endsWith('.html')?n:n+'.html');a.click();URL.revokeObjectURL(u);}
function importJSON(cb){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=migrateData(JSON.parse(ev.target.result));if(d.school&&d.classes&&d.teachers)cb(d);else alert('Invalid file.');}catch(e){alert('Parse error.');}};r.readAsText(f);};i.click();}

}

// ====== Helpers ======
const allocKey=(c,s)=>`${c}|${s}`;
// Non-teaching detection. Respects the explicit flags first; otherwise falls
// back to the period name so a row called "Recess 2" or "Lunch" acts as a
// break even if the Type flag was never toggled — a common user oversight.
const NONTEACHING_NAME_RE=/^(recess|break|lunch|interval|tiffin|short break|long break|assembly|morning\s+assembly|prayer|orientation|ho?m?e?\s*room|home\s*room)(\b|\d|$)/i;
function isNonTeaching(p){
  if(!p)return false;
  if(p.isBreak||p.isAssembly||p.isOrientation)return true;
  return NONTEACHING_NAME_RE.test((p.name||'').trim());
}
function inferredType(p){
  if(!p)return'teaching';
  if(p.isBreak)return'break';
  if(p.isAssembly)return'assembly';
  if(p.isOrientation)return'orientation';
  const n=(p.name||'').trim();
  if(/^(recess|break|lunch|interval|tiffin)/i.test(n))return'break';
  if(/^(assembly|morning\s+assembly|prayer)/i.test(n))return'assembly';
  if(/^(orientation|home\s*room|homeroom)/i.test(n))return'orientation';
  return'teaching';
}
function getTeachingCount(p){return p.filter(x=>!isNonTeaching(x)).length}
function getPeriodsForClass(school,cls){
  if(cls&&cls.group==='preprimary') return school.preprimaryPeriods||school.primaryPeriods;
  if(cls&&cls.group==='upper') return school.upperPeriods||school.primaryPeriods;
  return school.primaryPeriods;
}
// Return the day-category key (weekdays | activity | bagless) for a given day NAME.
function getCategoryForDay(school,dayName){
  const dc=(school&&school.dayCategories)||{weekdays:[],activity:[],bagless:[]};
  if((dc.bagless||[]).includes(dayName))return'bagless';
  if((dc.activity||[]).includes(dayName))return'activity';
  if((dc.weekdays||[]).includes(dayName))return'weekdays';
  return'weekdays';
}
// Return the period list that applies to a given class on a given day NAME,
// taking day-category + group into account. Falls back to the legacy grid
// if categoryPeriods are missing for that category.
function getPeriodsForClassDay(school,cls,dayName){
  if(!cls||!dayName)return getPeriodsForClass(school,cls);
  const cat=getCategoryForDay(school,dayName);
  const cp=(school.categoryPeriods||{})[cat];
  if(!cp)return getPeriodsForClass(school,cls);
  const key=cls.group==='preprimary'?'preprimaryPeriods':cls.group==='upper'?'upperPeriods':'primaryPeriods';
  return cp[key]||getPeriodsForClass(school,cls);
}
function timeOverlaps(s1,e1,s2,e2){return s1<e2&&e1>s2}

function findConflicts(tt,classes,school){
  const conflicts={};const teacherMap={};const roomMap={};
  const days=school.days||[];
  classes.forEach(cls=>{const clsDays=tt[cls.id]||{};
    Object.keys(clsDays).forEach(d=>{
      const dayName=days[Number(d)];
      const pList=getPeriodsForClassDay(school,cls,dayName);
      Object.keys(clsDays[d]||{}).forEach(pi=>{const c=clsDays[d][pi];if(!c)return;const p=pList[Number(pi)];if(!p||isNonTeaching(p))return;
        if(c.teacherId){const k=`${d}|${p.start}|${p.end}|T|${c.teacherId}`;if(!teacherMap[k])teacherMap[k]=[];teacherMap[k].push(`${cls.id}|${d}|${pi}`);}
        if(c.roomId){const rk=`${d}|${p.start}|${p.end}|R|${c.roomId}`;if(!roomMap[rk])roomMap[rk]=[];roomMap[rk].push(`${cls.id}|${d}|${pi}`);}
      });
    });
  });
  Object.values(teacherMap).forEach(arr=>{if(arr.length>1)arr.forEach(k=>{conflicts[k]='teacher';});});
  Object.values(roomMap).forEach(arr=>{if(arr.length>1)arr.forEach(k=>{conflicts[k]=conflicts[k]?'both':'room';});});
  return conflicts;
}

function teacherLoad(teacher,tt,classes,school){
  let total=0;const bySubject={},byClass={},byDay={};
  const days=school.days||[];
  days.forEach((_,i)=>{byDay[i]=0;});
  classes.forEach(cls=>{const tbl=tt[cls.id]||{};
    Object.keys(tbl).forEach(d=>{
      const dayName=days[Number(d)];
      const pList=getPeriodsForClassDay(school,cls,dayName);
      Object.keys(tbl[d]||{}).forEach(pi=>{const c=tbl[d][pi];
        if(c&&c.teacherId===teacher.id){const p=pList[Number(pi)];if(p&&!isNonTeaching(p)){total++;bySubject[c.subjectId]=(bySubject[c.subjectId]||0)+1;byClass[cls.id]=(byClass[cls.id]||0)+1;byDay[d]=(byDay[d]||0)+1;}}
      });
    });
  });
  return{total,bySubject,byClass,byDay};
}

function getTeacherScheduleForDay(teacherId,dayIdx,tt,classes,school){
  const sched=[];
  const dayName=(school.days||[])[Number(dayIdx)];
  classes.forEach(cls=>{const pList=getPeriodsForClassDay(school,cls,dayName);const dayTT=(tt[cls.id]||{})[dayIdx]||{};
    Object.entries(dayTT).forEach(([pi,cell])=>{if(cell&&cell.teacherId===teacherId){const p=pList[Number(pi)];if(p&&!isNonTeaching(p))sched.push({periodIdx:Number(pi),name:p.name,start:p.start,end:p.end,classId:cls.id,className:cls.name,subjectId:cell.subjectId,group:cls.group});}});});
  return sched.sort((a,b)=>a.start.localeCompare(b.start));
}

function findFreeTeachers(dayIdx,start,end,tt,classes,school,teachers,excludeIds){
  const busy=new Set(excludeIds||[]);
  const dayName=(school.days||[])[Number(dayIdx)];
  classes.forEach(cls=>{const pList=getPeriodsForClassDay(school,cls,dayName);const dayTT=(tt[cls.id]||{})[dayIdx]||{};
    Object.entries(dayTT).forEach(([pi,cell])=>{if(!cell||!cell.teacherId)return;const p=pList[Number(pi)];if(!p||isNonTeaching(p))return;
      if(timeOverlaps(p.start,p.end,start,end))busy.add(cell.teacherId);});});
  return teachers.filter(t=>!busy.has(t.id));
}

function SearchSelect({value,options,onChange,placeholder,style:wrapStyle}){
  const[open,setOpen]=useState(false);const[search,setSearch]=useState('');const ref=useRef(null);
  const filtered=options.filter(o=>o.label.toLowerCase().includes(search.toLowerCase()));
  const selected=options.find(o=>o.value===value);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[open]);
  return(
    <div className="ss-wrap" ref={ref} style={wrapStyle}>
      <button type="button" className="ss-trigger" onClick={()=>{setOpen(!open);setSearch('');}}>
        <span style={{color:selected?'var(--ink)':'var(--ink-muted)'}}>{selected?selected.label:(placeholder||'Select...')}</span>
        <span className="ss-arrow">{open?'▲':'▼'}</span>
      </button>
      {open&&(<div className="ss-drop">
        <input className="ss-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type to search..." autoFocus/>
        <div className="ss-list">{filtered.length===0?<div className="ss-opt" style={{color:'var(--ink-muted)',fontStyle:'italic'}}>No match</div>:
          filtered.map(o=>(<div key={o.value} className={`ss-opt ${o.value===value?'selected':''}`} onClick={()=>{onChange(o.value);setOpen(false);setSearch('');}}>{o.label}</div>))
        }</div>
      </div>)}
    </div>
  );
}

// ====== App ======
function App(){
  const[data,setData]=useState(null);const[tab,setTab]=useState('dashboard');const[loading,setLoading]=useState(true);
  const[sidebarCollapsed,setSidebarCollapsed]=useState(()=>{try{return localStorage.getItem('tws_sidebar_collapsed')==='1'}catch(e){return false}});
  const[searchOpen,setSearchOpen]=useState(false);
  const[undoHint,setUndoHint]=useState(null);
  // Microsoft SSO auth gate — the app is hidden until the user signs in.
  const[authUser,setAuthUser]=useState(null);
  const[authReady,setAuthReady]=useState(false);
  const[authError,setAuthError]=useState('');
  const pastRef=useRef([]);
  const futureRef=useRef([]);
  useEffect(()=>{loadData().then(d=>{setData(d);setLoading(false);});},[]);
  useEffect(()=>{if(data&&!loading)saveData(data);},[data,loading]);
  useEffect(()=>{try{localStorage.setItem('tws_sidebar_collapsed',sidebarCollapsed?'1':'0')}catch(e){}},[sidebarCollapsed]);
  useEffect(()=>{if(!undoHint)return;const t=setTimeout(()=>setUndoHint(null),6000);return()=>clearTimeout(t);},[undoHint]);
  // Auth bootstrap + listener — enforces school-tenant email domain as a
  // second-line defence on top of Supabase's single-tenant Azure provider.
  useEffect(()=>{
    const sb=getSupabase();
    if(!sb){setAuthError('Supabase client failed to load.');setAuthReady(true);return;}
    const validateUser=u=>{
      if(!u)return{ok:false,user:null};
      const email=(u.email||'').toLowerCase();
      if(SCHOOL_EMAIL_DOMAIN&&!email.endsWith(SCHOOL_EMAIL_DOMAIN.toLowerCase())){
        return{ok:false,user:null,error:'Only '+SCHOOL_EMAIL_DOMAIN+' accounts are authorised. You were signed out.'};
      }
      return{ok:true,user:u};
    };
    (async()=>{
      try{const{data:{user}}=await sb.auth.getUser();
        const v=validateUser(user);
        if(!v.ok&&user){try{await sb.auth.signOut();}catch(e){}setAuthUser(null);setAuthError(v.error||'');}
        else{setAuthUser(v.user);setAuthError('');}
      }catch(e){setAuthUser(null);}
      setAuthReady(true);
    })();
    const{data:sub}=sb.auth.onAuthStateChange((_ev,sess)=>{
      const v=validateUser(sess&&sess.user);
      if(!v.ok&&sess){try{sb.auth.signOut();}catch(e){}setAuthUser(null);setAuthError(v.error||'');}
      else{setAuthUser(v.user);if(v.ok)setAuthError('');}
    });
    return()=>{try{sub&&sub.subscription&&sub.subscription.unsubscribe();}catch(e){}};
  },[]);
  // Keyboard shortcuts
  useEffect(()=>{
    const h=e=>{
      const mod=e.ctrlKey||e.metaKey;
      const k=(e.key||'').toLowerCase();
      // Don't hijack native text-editing shortcuts while the user is typing.
      const tgt=e.target||{};
      const inText=tgt.tagName==='INPUT'||tgt.tagName==='TEXTAREA'||tgt.isContentEditable;
      if(mod&&k==='k'){e.preventDefault();setSearchOpen(v=>!v);return;}
      if(inText&&(k==='z'||k==='y'))return; // let the browser handle text undo/redo
      if(mod&&!e.shiftKey&&k==='z'){e.preventDefault();doUndo();return;}
      if((mod&&e.shiftKey&&k==='z')||(mod&&k==='y')){e.preventDefault();doRedo();return;}
      if(k==='escape'&&searchOpen)setSearchOpen(false);
    };
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[searchOpen]);
  // Expose undo helpers
  const doUndo=()=>{
    if(!pastRef.current.length)return;
    const prev=pastRef.current.pop();
    setData(curr=>{futureRef.current.push(curr);return prev;});
    setUndoHint({label:'Undone',kind:'undo'});
  };
  const doRedo=()=>{
    if(!futureRef.current.length)return;
    const next=futureRef.current.pop();
    setData(curr=>{pastRef.current.push(curr);return next;});
    setUndoHint({label:'Redone',kind:'redo'});
  };
  if(!authReady)return<SplashLoader label="Checking sign-in…"/>;
  if(!authUser)return<LoginGate error={authError} onSignOutNonTenant={()=>setAuthError('')}/>;
  if(loading||!data)return<div style={{padding:40,color:'#8a8f88'}}>Loading…</div>;
  // Wrapper over setData that records history and shows an undo bar
  const update=(patch,label)=>{
    setData(d=>{
      pastRef.current=[...pastRef.current.slice(-49),d];
      futureRef.current=[];
      return{...d,...patch};
    });
    if(label)setUndoHint({label,kind:'action',ts:Date.now()});
  };
  const tabs=[{id:'dashboard',num:'01',name:'Overview'},{id:'school',num:'02',name:'Day Structure'},{id:'classes',num:'03',name:'Classes'},{id:'qualmaster',num:'04',name:'Qual. Master'},{id:'teachers',num:'05',name:'Faculty'},{id:'subjects',num:'06',name:'Subjects'},{id:'allocate',num:'07',name:'Allocations'},{id:'timetable',num:'08',name:'Timetable'},{id:'load',num:'09',name:'Teacher Load'},{id:'proxy',num:'10',name:'Proxy Mgmt'},{id:'rules',num:'11',name:'Rules'}];
  const jumpTo=(target)=>{setSearchOpen(false);if(target&&target.tab)setTab(target.tab);};
  const canUndo=pastRef.current.length>0;const canRedo=futureRef.current.length>0;
  return(
    <div className="app">
      <aside className={`sidebar ${sidebarCollapsed?'collapsed':''}`}>
        <div style={{display:'flex',justifyContent:'flex-end',gap:6,padding:'0 14px',marginBottom:10}}>
          <button className="sidebar-toggle" style={{margin:0}} onClick={async()=>{try{await getSupabase().auth.signOut();}catch(e){}}} title={'Sign out '+(authUser.email||'')}>⎋</button>
          <button className="sidebar-toggle" style={{margin:0}} onClick={()=>setSidebarCollapsed(v=>!v)} title={sidebarCollapsed?'Expand sidebar':'Collapse sidebar'}>{sidebarCollapsed?'»':'«'}</button>
        </div>
        <div className="brand"><div className="mark">The World School · ICSE</div><div className="name serif">Timetable <em>Studio</em></div>{!sidebarCollapsed&&authUser&&<div style={{fontSize:10,color:'var(--ink-muted)',marginTop:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={authUser.email}>👤 {authUser.email}</div>}</div>
        {!sidebarCollapsed&&<div style={{padding:'0 14px 8px'}}>
          <button onClick={()=>setSearchOpen(true)} className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'space-between',fontSize:12}}><span>🔍 Search</span><span className="mono" style={{fontSize:10,color:'var(--ink-muted)'}}>⌘K</span></button>
        </div>}
        <nav className="nav">{tabs.map(t=>(<button key={t.id} className={`nav-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} title={sidebarCollapsed?t.name:undefined}><span className="num">{t.num}</span><span>{t.name}</span></button>))}</nav>
        <div className="footer-note" style={{padding:'12px 14px'}}>
          {!sidebarCollapsed&&<CloudSyncPanel data={data} setData={setData} authUser={authUser} onToast={msg=>setUndoHint({label:msg,kind:'info'})}/>}
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center',fontSize:11,opacity:canUndo?1:0.4}} disabled={!canUndo} onClick={doUndo} title="Undo (⌘Z)">↶ Undo</button>
            <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center',fontSize:11,opacity:canRedo?1:0.4}} disabled={!canRedo} onClick={doRedo} title="Redo (⌘⇧Z)">↷ Redo</button>
          </div>
          <button className="btn btn-primary btn-sm" style={{width:'100%',marginBottom:6,justifyContent:'center'}} onClick={()=>saveAsHTMLFile(data)}>Save as File</button>
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center',fontSize:11}} onClick={()=>exportJSON(data)}>Export JSON</button>
            <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center',fontSize:11}} onClick={()=>importJSON(d=>{setData(d);saveData(d);pastRef.current=[];futureRef.current=[];})}>Import JSON</button>
          </div>
        </div>
      </aside>
      <main className={`main ${sidebarCollapsed?'sidebar-collapsed':''}`}>
        {tab==='dashboard'&&<Dashboard data={data} setTab={setTab}/>}
        {tab==='school'&&<SchoolSetup data={data} update={update}/>}
        {tab==='classes'&&<ClassesPage data={data} update={update}/>}
        {tab==='qualmaster'&&<QualMasterPage data={data} update={update}/>}
        {tab==='teachers'&&<TeachersPage data={data} update={update}/>}
        {tab==='subjects'&&<SubjectsPage data={data} update={update}/>}
        {tab==='allocate'&&<AllocatePage data={data} update={update}/>}
        {tab==='timetable'&&<TimetablePage data={data} update={update}/>}
        {tab==='load'&&<LoadPage data={data}/>}
        {tab==='proxy'&&<ProxyPage data={data} update={update}/>}
        {tab==='rules'&&<RulesPage data={data}/>}
      </main>
      {searchOpen&&<GlobalSearch data={data} onClose={()=>setSearchOpen(false)} onJump={jumpTo}/>}
      {undoHint&&<UndoBar hint={undoHint} canUndo={canUndo} onUndo={doUndo} onDismiss={()=>setUndoHint(null)}/>}
    </div>
  );
}

// Cloud Sync panel — sidebar footer card that Pushes / Pulls the full data
// snapshot to a shared Supabase row. Passcode is hashed (SHA-256) and the
// hash must match between local + cloud before a Pull overwrites.
// Full-viewport splash while we resolve the initial auth session — avoids
// a "login page flash" for users who reload and already have a session.
function SplashLoader({label}){
  return(
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14,background:'var(--bg)'}}>
      <div style={{width:34,height:34,border:'3px solid var(--line)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin 0.9s linear infinite'}}></div>

// Full-viewport sign-in gate. Only the Microsoft SSO button gets in — any
// email not in the school's Microsoft 365 tenant is rejected by Azure, and
// the client-side domain guard catches anything that slips through.
function LoginGate({error,onSignOutNonTenant}){
  const[busy,setBusy]=useState(false);
  const[local,setLocal]=useState('');
  const signIn=async()=>{
    setBusy(true);setLocal('');
    try{
      const sb=getSupabase();if(!sb)throw new Error('Supabase client not loaded.');
      const redirectTo=window.location.origin+window.location.pathname;
      const{error}=await sb.auth.signInWithOAuth({
        provider:'azure',
        options:{scopes:'email openid profile',redirectTo}
      });
      if(error)throw error;
      // Browser redirects to Microsoft; this function doesn't return in the happy path.
    }catch(e){setLocal(String(e&&e.message||e));setBusy(false);}
  };
  return(
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:24,background:'radial-gradient(circle at 30% 20%, rgba(13,79,60,0.08), transparent 60%), var(--bg)'}}>
      <div style={{maxWidth:420,width:'100%',background:'var(--paper)',border:'1px solid var(--line)',borderRadius:14,padding:'36px 32px',boxShadow:'0 20px 60px rgba(0,0,0,0.08)',textAlign:'center'}}>
        <div style={{width:64,height:64,borderRadius:12,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px'}}>
          <img src="icon.svg" alt="" style={{width:40,height:40,filter:'brightness(0) invert(1)'}} onError={e=>{e.target.style.display='none';}}/>
        </div>
        <div style={{fontSize:11,letterSpacing:'.18em',textTransform:'uppercase',color:'var(--ink-muted)',fontWeight:500,marginBottom:6}}>The World School · ICSE</div>
        <h1 className="serif" style={{fontSize:32,lineHeight:1.1,marginBottom:8}}>Timetable <em style={{fontStyle:'italic',color:'var(--accent)'}}>Studio</em></h1>
        <p style={{fontSize:13.5,color:'var(--ink-soft)',marginBottom:24,lineHeight:1.5}}>Sign in with your school Microsoft 365 account to continue.</p>
        {(error||local)&&<div style={{marginBottom:14,padding:'10px 12px',background:'var(--danger-soft)',color:'var(--danger)',border:'1px solid var(--danger)',borderRadius:6,fontSize:12.5,textAlign:'left',lineHeight:1.5}}>{error||local}</div>}
        <button className="btn btn-primary" disabled={busy} onClick={signIn} style={{width:'100%',justifyContent:'center',padding:'12px 18px',fontSize:14,background:'#2f2f2f',color:'#fff'}}>
          <svg width="18" height="18" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" style={{marginRight:10,verticalAlign:'-3px'}}><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
          {busy?'Redirecting…':'Sign in with Microsoft'}
        </button>
        <div style={{fontSize:11,color:'var(--ink-muted)',marginTop:18,lineHeight:1.5}}>Access is limited to staff in The World School ICSE tenant.<br/>Contact your admin for access.</div>
      </div>
    </div>
  );
}

function CloudSyncPanel({data,setData,onToast,authUser}){
  const[pass,setPass]=useState(()=>{try{return localStorage.getItem('tws_cloud_passcode')||''}catch(e){return''}});
  const[open,setOpen]=useState(()=>!!(()=>{try{return localStorage.getItem('tws_cloud_passcode')}catch(e){return''}})());
  const[busy,setBusy]=useState(false);
  const[status,setStatus]=useState('');
  const[lastSeen,setLastSeen]=useState(()=>{try{return Number(localStorage.getItem('tws_cloud_lastSeen'))||0}catch(e){return 0}});
  // Realtime notice
  const[remoteNotice,setRemoteNotice]=useState(null); // {updatedAt, updatedBy}
  // Backups modal
  const[backupsOpen,setBackupsOpen]=useState(false);
  const savePass=v=>{setPass(v);try{localStorage.setItem('tws_cloud_passcode',v||'')}catch(e){}};
  const stampSeen=ts=>{setLastSeen(ts);try{localStorage.setItem('tws_cloud_lastSeen',String(ts||0))}catch(e){}};
  const fmtAgo=ts=>{if(!ts)return'never';const s=Math.max(1,Math.floor((Date.now()-ts)/1000));if(s<60)return s+'s ago';const m=Math.floor(s/60);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';};
  const cloudAvailable=typeof window!=='undefined'&&window.supabase;
  // Subscribe to remote row changes
  useEffect(()=>{
    if(!cloudAvailable||!open)return;
    const unsub=cloudSubscribeRow(newRow=>{
      if(!newRow)return;
      const ts=newRow.updated_at?new Date(newRow.updated_at).getTime():0;
      const by=newRow.updated_by||'someone';
      // Ignore my own writes — they match lastSeen within 2s.
      if(ts<=lastSeen+2000)return;
      setRemoteNotice({updatedAt:ts,updatedBy:by});
    });
    return unsub;
  },[cloudAvailable,open,lastSeen]);
  // updated_by is always the signed-in SSO identity — there's no anonymous path anymore.
  const effectiveWho=()=>(authUser&&authUser.email)||'unknown';
  const doPush=async()=>{
    if(!pass){setStatus('Enter a passcode first.');return;}
    if(!cloudAvailable){setStatus('Supabase client not loaded yet.');return;}
    setBusy(true);setStatus('Hashing…');
    try{
      const localHash=await sha256Hex(pass);
      setStatus('Checking cloud…');
      const cur=await cloudPullRow();
      if(cur&&cur.passcodeHash&&cur.passcodeHash!==localHash){
        if(!confirm('The cloud row is protected by a different passcode.\n\nPush anyway? This resets the cloud passcode to yours and overwrites the stored data.')){setBusy(false);setStatus('Push cancelled.');return;}
      }
      if(cur&&cur.updatedAt>lastSeen+1000){
        if(!confirm('Cloud was updated '+fmtAgo(cur.updatedAt)+' by '+(cur.updatedBy||'someone')+' (newer than your last sync). Push will overwrite it. Continue?')){setBusy(false);setStatus('Push cancelled.');return;}
      }
      setStatus('Pushing…');
      const r=await cloudPushRow({data,passcodeHash:localHash,updatedBy:effectiveWho()});
      stampSeen(r.updatedAt);
      setStatus('Pushed '+fmtAgo(r.updatedAt));
      // Fire-and-forget daily backup (rate-limited 12h inside the helper).
      cloudInsertBackup({data,updatedBy:effectiveWho()}).then(res=>{
        if(res&&res.ok)setStatus(s=>s+' · backup saved');
      });
      if(onToast)onToast('Pushed to cloud');
    }catch(e){setStatus('Error: '+(e.message||e));}
    finally{setBusy(false);}
  };
  const doPull=async()=>{
    if(!pass){setStatus('Enter a passcode first.');return;}
    if(!cloudAvailable){setStatus('Supabase client not loaded yet.');return;}
    setBusy(true);setStatus('Hashing…');
    try{
      const localHash=await sha256Hex(pass);
      setStatus('Pulling…');
      const cur=await cloudPullRow();
      if(!cur){setStatus('Cloud is empty — push first to seed.');setBusy(false);return;}
      if(cur.passcodeHash&&cur.passcodeHash!==localHash){
        setStatus('Passcode mismatch — cloud row is protected.');setBusy(false);return;
      }
      const localStamp=data._updatedAt||0;
      if(localStamp>cur.updatedAt+1000){
        if(!confirm('Your local copy is newer than cloud. Pull anyway? This overwrites local.')){setBusy(false);setStatus('Pull cancelled.');return;}
      }
      const migrated=migrateData(JSON.parse(JSON.stringify(cur.data)));
      setData(migrated);await saveData(migrated);
      stampSeen(cur.updatedAt);
      setRemoteNotice(null);
      setStatus('Pulled '+fmtAgo(cur.updatedAt));
      if(onToast)onToast('Pulled from cloud');
    }catch(e){setStatus('Error: '+(e.message||e));}
    finally{setBusy(false);}
  };
  const statusColor=status.startsWith('Error')||status.startsWith('Passcode')?'var(--danger)':status?'var(--accent)':'var(--ink-muted)';
  const inpStyle={width:'100%',padding:'6px 8px',border:'1px solid var(--line)',borderRadius:4,fontSize:11.5,marginBottom:6,background:'var(--paper)'};
  return(<>
    <div style={{marginBottom:10,padding:10,border:'1px solid var(--line)',borderRadius:6,background:'var(--bg)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?8:0,cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        <span style={{fontSize:10.5,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--ink-muted)',fontWeight:600}}>☁ Cloud Sync</span>
        <span style={{fontSize:10,color:remoteNotice?'var(--warm)':'var(--ink-muted)'}}>{remoteNotice?'new':(lastSeen?fmtAgo(lastSeen):'off')}</span>
      </div>
      {open&&<>
        <input type="password" value={pass} onChange={e=>savePass(e.target.value)} placeholder="Workspace passcode" style={inpStyle}/>
        <div style={{display:'flex',gap:6,marginBottom:6}}>
          <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center',fontSize:11}} disabled={busy||!pass||!cloudAvailable} onClick={doPush}>Push</button>
          <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:'center',fontSize:11}} disabled={busy||!pass||!cloudAvailable} onClick={doPull}>Pull</button>
          <button className="btn btn-ghost btn-sm" style={{fontSize:11,padding:'4px 8px'}} disabled={!cloudAvailable} onClick={()=>setBackupsOpen(true)} title="Browse daily backups">⋯</button>
        </div>
        {remoteNotice&&(
          <div style={{fontSize:10.5,color:'var(--warm)',background:'#fef3c7',padding:'6px 8px',borderRadius:4,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
            <span style={{flex:1}}>↻ {remoteNotice.updatedBy} pushed {fmtAgo(remoteNotice.updatedAt)} — Pull to apply.</span>
            <button onClick={doPull} className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'2px 6px'}} disabled={busy||!pass}>Pull</button>
          </div>
        )}
        <div style={{fontSize:10,color:statusColor,minHeight:14,lineHeight:1.3}}>{status||(cloudAvailable?(pass?'Signed in as '+((authUser&&authUser.email)||'unknown')+'. Ready.':'Enter passcode to enable.'):'Supabase offline.')}</div>
      </>}
    </div>
    {backupsOpen&&<BackupsModal onClose={()=>setBackupsOpen(false)} onRestore={(rd)=>{const migrated=migrateData(JSON.parse(JSON.stringify(rd)));setData(migrated);saveData(migrated);setBackupsOpen(false);if(onToast)onToast('Restored from backup');}}/>}
  </>);
}

// Modal listing the 20 most recent auto-backups (from tws_backups).
function BackupsModal({onClose,onRestore}){
  const[rows,setRows]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState('');
  const[restoring,setRestoring]=useState(null);
  useEffect(()=>{cloudListBackups(20).then(r=>{setRows(r);setLoading(false);}).catch(e=>{setErr(String(e.message||e));setLoading(false);});},[]);
  const fmtWhen=ts=>{try{return new Date(ts).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'});}catch(e){return ts;}};
  const doRestore=async(r)=>{
    if(!confirm('Restore this backup from '+fmtWhen(r.created_at)+'?\n\nThis overwrites your local data (but does not push to cloud until you hit Push).'))return;
    setRestoring(r.id);
    try{
      const full=await cloudFetchBackup(r.id);
      if(!full||!full.data)throw new Error('Backup has no data.');
      onRestore(full.data);
    }catch(e){alert('Restore failed: '+(e.message||e));setRestoring(null);}
  };
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Cloud backups" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
        <div className="modal-head"><h3 className="serif">Cloud <em>Backups</em></h3><div style={{fontSize:12,color:'var(--ink-muted)'}}>Auto-saved every ~12 hours when Push is used. Most recent first.</div></div>
        <div className="modal-body">
          {loading?<div style={{color:'var(--ink-muted)',padding:10}}>Loading…</div>:err?<div style={{color:'var(--danger)',padding:10,fontSize:13}}>{err}</div>:!rows.length?<div style={{color:'var(--ink-muted)',padding:10,fontStyle:'italic'}}>No backups yet. Push once to start the history.</div>:
          <table style={{width:'100%',fontSize:12.5}}><thead><tr><th>When</th><th>By</th><th style={{textAlign:'right'}}></th></tr></thead><tbody>
            {rows.map(r=>(<tr key={r.id}><td>{fmtWhen(r.created_at)}</td><td style={{color:'var(--ink-muted)'}}>{r.created_by||'—'}</td><td style={{textAlign:'right'}}><button className="btn btn-ghost btn-sm" disabled={restoring===r.id} onClick={()=>doRestore(r)}>{restoring===r.id?'…':'Restore'}</button></td></tr>))}
          </tbody></table>}
        </div>
        <div className="modal-foot"><button className="btn btn-ghost" onClick={onClose}>Close</button></div>
      </div>
    </div>
  );
}

// Global search (⌘K / Ctrl+K) — teachers, classes, subjects, rooms
function GlobalSearch({data,onClose,onJump}){
  const[q,setQ]=useState('');
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.focus();},[]);
  const Q=q.trim().toLowerCase();
  const matches=(s)=>(s||'').toString().toLowerCase().includes(Q);
  const teacherHits=!Q?[]:data.teachers.filter(t=>matches(t.name)||matches(t.code)||matches(t.designation)).slice(0,8);
  const classHits=!Q?[]:sortClasses(data.classes).filter(c=>matches(c.name)).slice(0,8);
  const subjectHits=!Q?[]:data.subjects.filter(s=>matches(s.name)||matches(s.code)).slice(0,8);
  const roomHits=!Q?[]:(data.rooms||[]).filter(r=>matches(r.name)).slice(0,8);
  const has=teacherHits.length+classHits.length+subjectHits.length+roomHits.length>0;
  const item=(label,meta,tab,dot)=>(
    <button onClick={()=>onJump({tab})} style={{display:'flex',width:'100%',alignItems:'center',gap:10,padding:'8px 12px',border:'none',background:'transparent',cursor:'pointer',textAlign:'left',borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.background='var(--line-soft)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
      {dot&&<span style={{width:8,height:8,borderRadius:'50%',background:dot,flexShrink:0}}></span>}
      <span style={{fontWeight:500,fontSize:13}}>{label}</span>
      <span style={{fontSize:11,color:'var(--ink-muted)',marginLeft:'auto'}}>{meta}</span>
    </button>
  );
  return(
    <div className="modal-bg" onClick={onClose} style={{alignItems:'flex-start',paddingTop:80}} role="presentation">
      <div className="modal" role="dialog" aria-modal="true" aria-label="Global search" onClick={e=>e.stopPropagation()} style={{maxWidth:560,width:'100%',maxHeight:'70vh'}}>
        <div style={{padding:'14px 16px',borderBottom:'1px solid var(--line)'}}>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search teachers, classes, subjects, rooms…" style={{width:'100%',padding:'8px 4px',border:'none',outline:'none',fontSize:15,background:'transparent',color:'var(--ink)'}}/>
          <div style={{fontSize:10.5,color:'var(--ink-muted)',marginTop:4,letterSpacing:'.06em'}}>Type to search · <span className="mono">Esc</span> to close</div>
        </div>
        <div style={{padding:'6px 6px 10px',overflowY:'auto'}}>
          {!Q&&<div style={{padding:20,color:'var(--ink-muted)',fontSize:12.5,textAlign:'center'}}>Finds teachers by name or code (try "SAK"), classes by section, subjects by code (MAT), and rooms.</div>}
          {Q&&!has&&<div style={{padding:20,color:'var(--ink-muted)',fontSize:12.5,textAlign:'center',fontStyle:'italic'}}>No matches for "{q}".</div>}
          {teacherHits.length>0&&<><div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--ink-muted)',padding:'8px 12px 4px',fontWeight:600}}>Teachers</div>{teacherHits.map(t=>(<div key={t.id}>{item(t.name+' · '+t.code,t.designation||'Teacher','teachers',t.status==='NEW'?'#d97a26':'var(--accent)')}</div>))}</>}
          {classHits.length>0&&<><div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--ink-muted)',padding:'8px 12px 4px',fontWeight:600}}>Classes</div>{classHits.map(c=>(<div key={c.id}>{item(c.name,c.group==='preprimary'?'Pre-Pri':c.group==='upper'?'Upper':'Primary','timetable',c.group==='preprimary'?'var(--ink-muted)':c.group==='upper'?'var(--warm)':'var(--accent)')}</div>))}</>}
          {subjectHits.length>0&&<><div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--ink-muted)',padding:'8px 12px 4px',fontWeight:600}}>Subjects</div>{subjectHits.map(s=>(<div key={s.id}>{item(s.name+' · '+s.code,'Subject','subjects',s.color)}</div>))}</>}
          {roomHits.length>0&&<><div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--ink-muted)',padding:'8px 12px 4px',fontWeight:600}}>Rooms</div>{roomHits.map(r=>(<div key={r.id}>{item(r.name,'Room','school','var(--ink-muted)')}</div>))}</>}
        </div>
      </div>
    </div>
  );
}
